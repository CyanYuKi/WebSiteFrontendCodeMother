<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光影句 · 作品集</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #1A1A1A;
            --color-secondary: #D4D0C8;
            --color-background: #F7F5F2;
            --color-surface: #FFFFFF;
            --color-text: #1C1C1C;
            --color-text-muted: #7A756D;
            --color-accent: #B89B5A;
            --font-heading: 'Cormorant Garamond', serif;
            --font-body: 'DM Sans', sans-serif;
            --spacing-unit: 8px;
        }
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: var(--font-body);
            background-color: var(--color-background);
            color: var(--color-text);
            line-height: 1.6;
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        ul {
            list-style: none;
        }
        img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ===== 导航栏 (与首页一致) ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px calc(var(--spacing-unit) * 6);
            background: rgba(247, 245, 242, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(26, 26, 26, 0.06);
            transition: background 0.3s;
        }
        .navbar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: var(--font-heading);
            font-size: 1.4rem;
            color: var(--color-primary);
            letter-spacing: 0.04em;
            font-weight: 500;
        }
        .navbar-logo img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            aspect-ratio: 1/1;
        }
        .navbar-links {
            display: flex;
            gap: calc(var(--spacing-unit) * 3);
        }
        .navbar-links a {
            font-size: 0.8rem;
            padding: 8px 20px;
            border: 1px solid rgba(26, 26, 26, 0.2);
            border-radius: 24px;
            background: transparent;
            color: var(--color-text);
            transition: background 0.3s, border-color 0.3s, color 0.3s;
            letter-spacing: 0.04em;
        }
        .navbar-links a:hover {
            background: var(--color-primary);
            border-color: var(--color-primary);
            color: #fff;
        }
        .navbar-links a.active {
            background: var(--color-primary);
            border-color: var(--color-primary);
            color: #fff;
        }
        .navbar-cta {
            padding: 10px 28px;
            border: 1px solid var(--color-accent);
            border-radius: 30px;
            background: transparent;
            color: var(--color-accent);
            font-size: 0.8rem;
            letter-spacing: 0.06em;
            text-decoration: none;
            transition: background 0.3s, color 0.3s;
        }
        .navbar-cta:hover {
            background: var(--color-accent);
            color: #fff;
        }

        /* ===== Page Hero ===== */
        .page-hero {
            padding: 140px calc(var(--spacing-unit) * 6) 60px;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
            background: var(--color-background);
        }
        .page-hero h1 {
            font-family: var(--font-heading);
            font-size: 3.2rem;
            font-weight: 400;
            color: var(--color-primary);
            letter-spacing: 0.03em;
            margin-bottom: 16px;
        }
        .page-hero p {
            font-size: 1rem;
            color: var(--color-text-muted);
            max-width: 540px;
            margin: 0 auto;
            line-height: 1.7;
        }

        /* ===== 分类标签 ===== */
        .category-tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 32px calc(var(--spacing-unit) * 4) 20px;
            max-width: 900px;
            margin: 0 auto;
            flex-wrap: wrap;
        }
        .category-tabs span {
            font-family: var(--font-heading);
            font-size: 1.1rem;
            letter-spacing: 0.04em;
            color: var(--color-text-muted);
            padding: 6px 0;
            border-bottom: 2px solid transparent;
            cursor: default;
            transition: color 0.3s, border-color 0.3s;
        }
        .category-tabs span.active {
            color: var(--color-primary);
            border-bottom-color: var(--color-accent);
        }
        .category-tabs span:not(.active):hover {
            color: var(--color-primary);
        }

        /* ===== 非对称瀑布流网格 (Grid) ===== */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            padding: 20px calc(var(--spacing-unit) * 4) 80px;
            max-width: 1280px;
            margin: 0 auto;
        }
        .grid-item {
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            background: var(--color-surface);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            cursor: pointer;
        }
        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }
        .grid-item:hover img {
            transform: scale(1.06);
        }

        /* 非对称尺寸 — 使用 grid row/col span 制造瀑布感 */
        .grid-item--tall {
            grid-row: span 2;
        }
        .grid-item--wide {
            grid-column: span 2;
        }
        .grid-item--large {
            grid-column: span 2;
            grid-row: span 2;
        }

        /* 图片内部遮罩 + 分类标记（可选低调） */
        .grid-item .caption {
            position: absolute;
            bottom: 12px;
            left: 16px;
            right: 16px;
            font-family: var(--font-body);
            font-size: 0.7rem;
            letter-spacing: 0.06em;
            color: rgba(255, 255, 255, 0.8);
            background: linear-gradient(transparent, rgba(0,0,0,0.3));
            padding: 20px 4px 6px 4px;
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
        }
        .grid-item:hover .caption {
            opacity: 1;
        }

        /* ===== Footer (与首页保持一致的简约风格) ===== */
        .footer {
            background: var(--color-primary);
            color: var(--color-secondary);
            padding: 48px calc(var(--spacing-unit) * 6) 32px;
            text-align: center;
        }
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 32px;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }
        .footer-links a {
            color: var(--color-secondary);
            font-size: 0.8rem;
            letter-spacing: 0.06em;
            transition: color 0.25s;
            border: none;
            padding: 0;
            background: none;
            border-radius: 0;
            opacity: 0.8;
        }
        .footer-links a:hover {
            color: #fff;
            opacity: 1;
        }
        .footer-copy {
            font-size: 0.7rem;
            color: rgba(212, 208, 200, 0.5);
            letter-spacing: 0.04em;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 1024px) {
            .portfolio-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 12px;
                padding: 20px 20px 60px;
            }
            .navbar {
                padding: 14px 20px;
            }
            .navbar-links {
                gap: 8px;
            }
            .navbar-links a {
                font-size: 0.75rem;
                padding: 6px 14px;
            }
            .navbar-cta {
                padding: 8px 20px;
                font-size: 0.75rem;
            }
        }
        @media (max-width: 768px) {
            .portfolio-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
                padding: 16px 16px 50px;
            }
            .grid-item--tall,
            .grid-item--wide,
            .grid-item--large {
                grid-row: span 1;
                grid-column: span 1;
            }
            .page-hero h1 {
                font-size: 2.2rem;
            }
            .page-hero {
                padding: 120px 20px 40px;
            }
            .navbar-links {
                display: none;
            }
            .navbar {
                padding: 12px 16px;
            }
            .footer {
                padding: 36px 20px 24px;
            }
            .footer-links {
                gap: 20px;
            }
        }
        @media (max-width: 480px) {
            .portfolio-grid {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
                padding: 12px 12px 40px;
            }
            .category-tabs {
                gap: 12px;
                padding: 24px 12px 12px;
            }
            .category-tabs span {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
