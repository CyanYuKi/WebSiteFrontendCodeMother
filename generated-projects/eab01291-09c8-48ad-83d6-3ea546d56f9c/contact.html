<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系 · 光影茶话</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        /* ===== 设计系统 :root ===== */
        :root {
            --color-primary: #2A3B32;
            --color-secondary: #D8CBB9;
            --color-background: #F9F7F4;
            --color-surface: #FFFFFF;
            --color-text: #1A1A1A;
            --color-textMuted: #75706A;
            --color-accent: #C48A58;
            --font-heading: 'Fraunces', Georgia, serif;
            --font-body: 'Outfit', system-ui, sans-serif;
            --spacing-unit: 8px;
            --spacing-xs: calc(var(--spacing-unit) * 1);
            --spacing-sm: calc(var(--spacing-unit) * 2);
            --spacing-md: calc(var(--spacing-unit) * 4);
            --spacing-lg: calc(var(--spacing-unit) * 8);
            --spacing-xl: calc(var(--spacing-unit) * 12);
            --radius-sm: 6px;
            --radius-md: 12px;
            --transition: 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--color-background);
            color: var(--color-text);
            font-family: var(--font-body);
            line-height: 1.6;
            font-weight: 300;
            min-height: 100vh;
        }

        img {
            display: block;
            max-width: 100%;
            height: auto;
        }

        a {
            color: inherit;
            text-decoration: none;
            transition: color var(--transition);
        }

        /* ===== 导航栏 (与首页完全一致) ===== */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-lg);
            z-index: 100;
            background: transparent;
            padding: var(--spacing-md) 0;
        }

        nav a {
            writing-mode: vertical-rl;
            font-family: var(--font-body);
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            color: var(--color-textMuted);
            text-orientation: mixed;
            transition: color var(--transition);
            padding: var(--spacing-xs) 0;
        }

        nav a:hover,
        nav a.active {
            color: var(--color-primary);
        }

        nav a.active {
            font-weight: 600;
            position: relative;
        }

        /* ===== 页面独有布局：form ===== */
        .page-contact {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-xl) var(--spacing-xl) var(--spacing-xl) calc(40px + var(--spacing-xl));
        }

        .contact-card {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: var(--color-surface);
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(42, 59, 50, 0.10);
        }

        .contact-image {
            position: relative;
            min-height: 400px;
            overflow: hidden;
            background: var(--color-primary);
        }

        .contact-image img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.75;
            transition: opacity 0.6s ease;
        }

        .contact-image:hover img {
            opacity: 0.85;
        }

        .contact-form-wrap {
            padding: var(--spacing-lg) var(--spacing-md);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .contact-form-wrap h1 {
            font-family: var(--font-heading);
            font-size: 2rem;
            font-weight: 400;
            color: var(--color-primary);
            margin-bottom: var(--spacing-sm);
            letter-spacing: 0.02em;
        }

        .contact-form-wrap p {
            color: var(--color-textMuted);
            font-size: 0.95rem;
            margin-bottom: var(--spacing-md);
            font-weight: 300;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .form-group label {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            color: var(--color-textMuted);
            text-transform: uppercase;
        }

        .form-group input,
        .form-group textarea {
            border: 1px solid var(--color-secondary);
            border-radius: var(--radius-sm);
            padding: var(--spacing-sm) var(--spacing-xs);
            font-family: var(--font-body);
            font-size: 0.9rem;
            background: var(--color-background);
            color: var(--color-text);
            transition: border-color var(--transition), box-shadow var(--transition);
            outline: none;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--color-accent);
            box-shadow: 0 0 0 3px rgba(196, 138, 88, 0.15);
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .submit-btn {
            margin-top: var(--spacing-xs);
            padding: var(--spacing-sm) var(--spacing-md);
            background: var(--color-primary);
            color: var(--color-surface);
            border: none;
            border-radius: var(--radius-sm);
            font-family: var(--font-body);
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: background var(--transition), transform var(--transition);
            align-self: flex-start;
        }

        .submit-btn:hover {
            background: var(--color-accent);
            transform: translateY(-2px);
        }

        .contact-info {
            margin-top: var(--spacing-md);
            padding-top: var(--spacing-sm);
            border-top: 1px solid var(--color-secondary);
            display: flex;
            gap: var(--spacing-md);
            flex-wrap: wrap;
            font-size: 0.85rem;
            color: var(--color-textMuted);
        }

        .contact-info span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .contact-info span i {
            font-style: normal;
            font-weight: 400;
            color: var(--color-accent);
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            nav {
                width: 36px;
                gap: var(--spacing-md);
            }
            nav a {
                font-size: 0.6rem;
            }
            .page-contact {
                padding: var(--spacing-lg) var(--spacing-md) var(--spacing-lg) calc(36px + var(--spacing-md));
            }
            .contact-card {
                grid-template-columns: 1fr;
            }
            .contact-image {
                min-height: 200px;
            }
            .contact-form-wrap h1 {
                font-size: 1.6rem;
            }
        }

        @media (max-width: 480px) {
            .page-contact {
                padding: var(--spacing-md) var(--spacing-sm) var(--spacing-md) calc(36px + var(--spacing-sm));
            }
            .contact-form-wrap {
                padding: var(--spacing-md) var(--spacing-sm);
            }
            .contact-info {
                flex-direction: column;
                gap: var(--spacing-xs);
            }
        }

        /* ===== footer 与首页一致 ===== */
        footer {
            position: fixed;
            bottom: var(--spacing-md);
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.65rem;
            color: var(--color-textMuted);
            letter-spacing: 0.05em;
            background: var(--color-background);
            padding: 0 var(--spacing-sm);
            z-index: 50;
        }
        footer a {
            color: var(--color-accent);
            margin: 0 var(--spacing-xs);
        }
        footer a:hover {
            color: var(--color-primary);
        }
    </style>
</head>
<body>

    <!-- 导航栏 (与首页结构完全一致) -->
    <nav>
        <a href="index.html">首页</a>
        <a href="gallery.html">作品</a>
        <a href="about.html">关于</a>
        <a href="contact.html" class="active">联系</a>
    </nav>

    <!-- 联系页面主体 -->
    <main class="page-contact">
        <div class="contact-card">
            <!-- 左侧背景图：茶田氛围 -->
            <div class="contact-image">
                <img src="https://images.pexels.com/photos/9458996/pexels-photo-9458996.jpeg?auto=compress&cs=tinysrgb&h=650&w=940" alt="茶田氛圍" loading="lazy">
            </div>

            <!-- 右侧表单区域 -->
            <div class="contact-form-wrap">
                <h1>联系</h1>
                <p>期待与你交流，共同捕捉光影中的茶韵。</p>

                <form class="contact-form" action="#" method="post">
                    <div class="form-group">
                        <label for="name">姓名</label>
                        <input type="text" id="name" name="name" placeholder="你的名字" required>
                    </div>
                    <div class="form-group">
                        <label for="email">邮箱</label>
                        <input type="email" id="email" name="email" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="message">需求描述</label>
                        <textarea id="message" name="message" placeholder="请描述你的拍摄需求或想法…" required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">发送</button>
                </form>

                <!-- 微信/电话信息 -->
                <div class="contact-info">
                    <span><i>📱</i> 电话：+86 138 8888 8888</span>
                    <span><i>💬</i> 微信：chaguang_photo</span>
                </div>
            </div>
        </div>
    </main>

    <!-- footer 与首页一致 -->
    <footer>
        <span>© 2025 光影茶话 ·</span>
        <a href="index.html">首页</a>
        <a href="gallery.html">作品</a>
        <a href="about.html">关于</a>
        <a href="contact.html">联系</a>
    </footer>

</body>
</html>
