<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>垣迹 · 摄影</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-primary: #E8E4D9;
            --color-secondary: #7A7670;
            --color-background: #0C0C0A;
            --color-surface: #181815;
            --color-text: #F2F0EB;
            --color-textMuted: #999691;
            --color-accent: #C9A675;
            --font-heading: 'Playfair Display', serif;
            --font-body: 'DM Sans', sans-serif;
            --spacing-unit: 1rem;
            --scale: 1.35;
            --spacing-scale: 1.6;
        }

        html {
            scroll-behavior: smooth;
            background-color: var(--color-background);
        }

        body {
            font-family: var(--font-body);
            font-weight: 300;
            background-color: var(--color-background);
            color: var(--color-text);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        img {
            display: block;
            max-width: 100%;
            height: auto;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        /* --- 极简悬浮导航 --- */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.2rem 3rem;
            background: rgba(12, 12, 10, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(201, 166, 117, 0.08);
            transition: background 0.3s ease;
        }

        .navbar-logo {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-family: var(--font-heading);
            font-size: 1.4rem;
            font-weight: 400;
            letter-spacing: 2px;
            color: var(--color-primary);
        }

        .navbar-logo img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .navbar-links {
            display: flex;
            align-items: center;
            gap: 2.8rem;
            list-style: none;
        }

        .navbar-links li {
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: var(--color-textMuted);
            transition: color 0.25s ease;
            cursor: pointer;
        }

        .navbar-links li:hover,
        .navbar-links li.active {
            color: var(--color-accent);
        }

        /* --- 全屏沉浸式 Hero --- */
        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            min-height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 20%;
            filter: brightness(0.55) saturate(0.85);
            transition: filter 0.6s ease;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(145deg, rgba(12,12,10,0.30) 0%, rgba(12,12,10,0.85) 100%);
            pointer-events: none;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 780px;
            padding: 2rem;
        }

        .hero-content h1 {
            font-family: var(--font-heading);
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 400;
            line-height: 1.1;
            letter-spacing: 4px;
            color: var(--color-primary);
            margin-bottom: 1.2rem;
            text-shadow: 0 4px 30px rgba(0,0,0,0.6);
        }

        .hero-content .sub {
            font-size: clamp(0.95rem, 2vw, 1.2rem);
            font-weight: 300;
            color: var(--color-textMuted);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 2.5rem;
        }

        .hero-content .scroll-indicator {
            display: inline-block;
            margin-top: 2rem;
            width: 2px;
            height: 60px;
            background: linear-gradient(to bottom, var(--color-accent), transparent);
            animation: pulse-height 2.2s ease-in-out infinite;
        }

        @keyframes pulse-height {
            0%, 100% { transform: scaleY(0.6); opacity: 0.5; }
            50% { transform: scaleY(1); opacity: 1; }
        }

        /* --- 不对称网格画廊 --- */
        .gallery-section {
            padding: 8rem 3rem 6rem;
            max-width: 1440px;
            margin: 0 auto;
        }

        .gallery-header {
            margin-bottom: 4rem;
        }

        .gallery-header h2 {
            font-family: var(--font-heading);
            font-size: clamp(2rem, 4vw, 3.2rem);
            font-weight: 400;
            color: var(--color-primary);
            letter-spacing: 1px;
        }

        .gallery-header p {
            color: var(--color-textMuted);
            font-size: 1rem;
            max-width: 480px;
            margin-top: 0.8rem;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1.5fr;
            grid-auto-rows: 280px 320px 260px;
            gap: 1.2rem;
        }

        .gallery-grid .item {
            overflow: hidden;
            position: relative;
            border-radius: 0;
            background: var(--color-surface);
        }

        .gallery-grid .item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.6s ease;
            filter: grayscale(0.2) brightness(0.85);
        }

        .gallery-grid .item:hover img {
            transform: scale(1.05);
            filter: grayscale(0) brightness(1);
        }

        .item-1 { grid-column: 1 / 2; grid-row: 1 / 3; }
        .item-2 { grid-column: 2 / 4; grid-row: 1 / 2; }
        .item-3 { grid-column: 2 / 3; grid-row: 2 / 4; }
        .item-4 { grid-column: 3 / 4; grid-row: 2 / 3; }
        .item-5 { grid-column: 1 / 2; grid-row: 3 / 4; }
        .item-6 { grid-column: 3 / 4; grid-row: 3 / 4; }

        /* --- 关于 / 单栏 --- */
        .about-section {
            padding: 5rem 3rem 7rem;
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 4rem;
            align-items: center;
        }

        .about-image {
            flex: 1 1 380px;
            aspect-ratio: 3 / 2;
            overflow: hidden;
            background: var(--color-surface);
        }

        .about-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.8);
        }

        .about-text {
            flex: 1 1 380px;
        }

        .about-text h3 {
            font-family: var(--font-heading);
            font-size: 2.2rem;
            font-weight: 400;
            color: var(--color-primary);
            letter-spacing: 1px;
            margin-bottom: 1.2rem;
        }

        .about-text p {
            color: var(--color-textMuted);
            font-size: 1rem;
            line-height: 1.8;
            margin-bottom: 1.8rem;
            text-wrap: pretty;
        }

        .about-text .cta-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--color-accent);
            font-weight: 400;
            letter-spacing: 1.5px;
            font-size: 0.9rem;
            text-transform: uppercase;
            border-bottom: 1px solid transparent;
            transition: border-color 0.3s ease;
        }

        .about-text .cta-link:hover {
            border-bottom-color: var(--color-accent);
        }

        /* --- Footer 单栏联系 --- */
        .footer-contact {
            background: var(--color-surface);
            padding: 5rem 3rem 3rem;
            margin-top: 3rem;
        }

        .footer-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 1.2rem;
        }

        .footer-inner .contact-title {
            font-family: var(--font-heading);
            font-size: 2.8rem;
            font-weight: 400;
            color: var(--color-primary);
            letter-spacing: 4px;
        }

        .footer-inner .contact-sub {
            color: var(--color-textMuted);
            font-size: 1rem;
            max-width: 400px;
            margin-bottom: 0.5rem;
        }

        .footer-inner .contact-email {
            color: var(--color-accent);
            font-size: 1.2rem;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(201, 166, 117, 0.3);
            padding-bottom: 0.2rem;
        }

        .footer-divider {
            width: 60px;
            height: 1px;
            background: var(--color-secondary);
            margin: 1.2rem 0;
        }

        .footer-meta {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
            font-size: 0.8rem;
            color: var(--color-textMuted);
            letter-spacing: 1px;
            margin-top: 1rem;
        }

        .footer-meta a {
            color: var(--color-textMuted);
            transition: color 0.3s;
        }

        .footer-meta a:hover {
            color: var(--color-accent);
        }

        /* --- 响应式 --- */
        @media (max-width: 900px) {
            .navbar {
                padding: 1rem 1.5rem;
            }

            .navbar-links {
                gap: 1.6rem;
            }

            .navbar-links li {
                font-size: 0.75rem;
                letter-spacing: 0.8px;
            }

            .gallery-section {
                padding: 5rem 1.5rem 3rem;
            }

            .gallery-grid {
                grid-template-columns: 1fr 1fr;
                grid-auto-rows: 220px 240px 200px;
                gap: 0.8rem;
            }

            .item-1 { grid-column: 1 / 2; grid-row: 1 / 3; }
            .item-2 { grid-column: 2 / 3; grid-row: 1 / 2; }
            .item-3 { grid-column: 2 / 3; grid-row: 2 / 4; }
            .item-4 { grid-column: 1 / 2; grid-row: 3 / 4; }
            .item-5 { grid-column: 1 / 2; grid-row: 4 / 5; }
            .item-6 { grid-column: 2 / 3; grid-row: 4 / 5; }
        }

        @media (max-width: 640px) {
            .navbar {
                padding: 0.8rem 1rem;
                flex-wrap: wrap;
                gap: 0.5rem;
            }

            .navbar-links {
                gap: 0.8rem;
                flex-wrap: wrap;
            }

            .navbar-links li {
                font-size: 0.7rem;
                letter-spacing: 0.5px;
            }

            .hero-content h1 {
                letter-spacing: 2px;
            }

            .gallery-grid {
                grid-template-columns: 1fr;
                grid-auto-rows: 200px;
                gap: 0.6rem;
            }

            .item-1, .item-2, .item-3, .item-4, .item-5, .item-6 {
                grid-column: 1 / 2;
                grid-row: auto;
            }

            .about-section {
                padding: 3rem 1.5rem;
                flex-direction: column;
                gap: 2rem;
            }

            .footer-contact {
                padding: 3rem 1.5rem 2rem;
            }

            .footer-inner .contact-title {
                font-size: 2rem;
            }
        }

        /* 占位符 */
        .no-js-message {
            display: none;
        }
    </style>
</head>
