<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系 - 风景摄影</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #2A3D30;
            --color-secondary: #B8A89A;
            --color-background: #F9F8F5;
            --color-surface: #F1F0EC;
            --color-text: #111;
            --color-textMuted: #665F55;
            --color-accent: #C48B5F;
            --font-heading: 'Cormorant Garamond', serif;
            --font-body: 'DM Sans', sans-serif;
            --spacing-unit: 1rem;
            --ratio: 1.5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--color-background);
            color: var(--color-text);
            font-family: var(--font-body);
            line-height: 1.6;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
        }

        a {
            color: inherit;
            text-decoration: none;
            display: inline-block;
        }

        img {
            display: block;
            max-width: 100%;
            height: auto;
            width: 100%;
            height: 100%;
            object-fit: cover;
            aspect-ratio: auto;
        }

        .site-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 2rem 3rem;
            display: flex;
            justify-content: flex-end;
            gap: 2.5rem;
            background: linear-gradient(to bottom, rgba(249,248,245,1) 0%, rgba(249,248,245,0.8) 70%, transparent 100%);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }

        .site-nav a {
            font-family: var(--font-body);
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--color-text);
            transition: color 0.25s;
            padding: 0.2rem 0;
            border-bottom: 1px solid transparent;
        }

        .site-nav a:hover {
            color: var(--color-primary);
            border-bottom-color: var(--color-primary);
        }

        .site-nav a.active {
            color: var(--color-primary);
            border-bottom-color: var(--color-primary);
        }

        .page-contact {
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            padding-top: 8rem;
            padding-bottom: 4rem;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 3rem;
            width: 100%;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .contact-info h1 {
            font-family: var(--font-heading);
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 500;
            color: var(--color-primary);
            line-height: 1.15;
            letter-spacing: -0.02em;
        }

        .contact-info p {
            color: var(--color-textMuted);
            font-size: 0.95rem;
            max-width: 32rem;
            line-height: 1.7;
        }

        .contact-details {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .contact-detail-item {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .contact-detail-item .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--color-textMuted);
            font-weight: 500;
        }

        .contact-detail-item .value {
            font-size: 1rem;
            color: var(--color-text);
            font-weight: 400;
        }

        .social-links {
            display: flex;
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .social-links a {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--color-textMuted);
            border-bottom: 1px solid transparent;
            transition: color 0.2s, border-color 0.2s;
            padding-bottom: 2px;
        }

        .social-links a:hover {
            color: var(--color-primary);
            border-bottom-color: var(--color-accent);
        }

        .contact-form-wrapper {
            background: var(--color-surface);
            padding: 2.5rem;
            border-radius: 0px;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .form-group label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--color-textMuted);
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--color-secondary);
            padding: 0.6rem 0.2rem;
            font-family: var(--font-body);
            font-size: 0.95rem;
            color: var(--color-text);
            outline: none;
            transition: border-color 0.25s;
            width: 100%;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-bottom-color: var(--color-accent);
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-group select {
            appearance: none;
            background: transparent;
            cursor: pointer;
        }

        .submit-btn {
            display: inline-block;
            padding: 0.8rem 2.8rem;
            border: 1px solid var(--color-primary);
            color: var(--color-primary);
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            background: transparent;
            cursor: pointer;
            transition: background 0.25s, color 0.25s;
            font-family: var(--font-body);
            margin-top: 0.5rem;
            align-self: flex-start;
            width: auto;
        }

        .submit-btn:hover {
            background: var(--color-primary);
            color: #fff;
        }

        .contact-image {
            width: 100%;
            height: 100%;
            min-height: 400px;
            position: relative;
            overflow: hidden;
        }

        .contact-image img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .footer {
            text-align: center;
            padding: 3rem 2rem 2rem;
            border-top: 1px solid var(--color-surface);
            margin-top: 0;
            background: var(--color-background);
        }

        .footer p {
            color: var(--color-textMuted);
            font-size: 0.8rem;
            letter-spacing: 0.04em;
        }

        .footer a {
            color: var(--color-textMuted);
            transition: color 0.2s;
        }

        .footer a:hover {
            color: var(--color-primary);
        }

        @media (max-width: 900px) {
            .contact-grid {
                grid-template-columns: 1fr;
                gap: 2.5rem;
                padding: 0 1.5rem;
            }

            .site-nav {
                padding: 1.2rem 1.5rem;
                gap: 1.5rem;
                justify-content: center;
            }

            .page-contact {
                padding-top: 6rem;
            }

            .contact-image {
                min-height: 280px;
                order: -1;
            }

            .contact-info h1 {
                font-size: 2.2rem;
            }

            .contact-form-wrapper {
                padding: 1.8rem;
            }

            .submit-btn {
                align-self: stretch;
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            .site-nav {
                gap: 1rem;
                padding: 1rem 1rem;
                font-size: 0.75rem;
            }

            .contact-grid {
                padding: 0 1rem;
            }

            .contact-form-wrapper {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <nav class="site-nav">
        <a href="index.html">首页</a>
        <a href="about.html">关于</a>
        <a href="portfolio.html">作品集</a>
        <a href="contact.html" class="active">联系</a>
    </nav>

    <main class="page-contact">
        <div class="contact-grid">
            <div class="contact-info">
                <h1>让我们<br>开启对话</h1>
                <p>
                    无论是项目委托、合作邀约，还是仅仅想聊聊关于自然与影像的故事，我都乐于倾听。请留下您的想法，我会尽快回复。
                </p>
                <div class="contact-details">
                    <div class="contact-detail-item">
                        <span class="label">工作室地址</span>
                        <span class="value">杭州市西湖区龙井路 88 号<br>自然影像工作室</span>
                    </div>
                    <div class="contact-detail-item">
                        <span class="label">电子邮箱</span>
                        <span class="value">hello@naturescape.studio</span>
                    </div>
                    <div class="contact-detail-item">
                        <span class="label">联系电话</span>
                        <span class="value">+86 (0571) 8888-6666</span>
                    </div>
                </div>
                <div class="social-links">
                    <a href="https://instagram.com" target="_blank" rel="noopener noreferrer">Instagram</a>
                    <a href="https://500px.com" target="_blank" rel="noopener noreferrer">500px</a>
                    <a href="https://weibo.com" target="_blank" rel="noopener noreferrer">微博</a>
                </div>
            </div>
            <div>
                <div class="contact-form-wrapper">
                    <form class="contact-form">
                        <div class="form-group">
                            <label for="name">姓名</label>
                            <input type="text" id="name" name="name" placeholder="您的姓名" required>
                        </div>
                        <div class="form-group">
                            <label for="email">邮箱</label>
                            <input type="email" id="email" name="email" placeholder="your@email.com" required>
                        </div>
                        <div class="form-group">
                            <label for="type">需求类型</label>
                            <select id="type" name="type">
                                <option value="" disabled selected>请选择</option>
                                <option value="委托拍摄">委托拍摄</option>
                                <option value="商业合作">商业合作</option>
                                <option value="展览/出版">展览/出版</option>
                                <option value="其他">其他</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="message">留言</label>
                            <textarea id="message" name="message" placeholder="请描述您的想法或需求……" required></textarea>
                        </div>
                        <button type="submit" class="submit-btn">发送消息</button>
                    </form>
                </div>
                <div class="contact-image">
                    <img src="https://images.pexels.com/photos/9903248/pexels-photo-9903248.jpeg?auto=compress&cs=tinysrgb&h=650&w=940" alt="联系区背景图" loading="lazy">
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>© 2025 自然影像 · <a href="index.html">首页</a> · <a href="about.html">关于</a> · <a href="portfolio.html">作品集</a> · <a href="contact.html">联系</a></p>
        <p style="margin-top: 0.8rem; font-size: 0.7rem;">用镜头讲述每一寸土地的故事</p>
    </footer>

</body>
</html>
