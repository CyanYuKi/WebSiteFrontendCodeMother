<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品画廊 - 静默影像</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #1A1A1A;
            --color-secondary: #6B7280;
            --color-background: #F9F8F6;
            --color-surface: #FFFFFF;
            --color-text: #111;
            --color-textMuted: #666;
            --color-accent: #C8A97E;
            --font-heading: 'Cormorant Garamond', Georgia, serif;
            --font-body: 'DM Sans', system-ui, sans-serif;
            --spacing-unit: 1rem;
            --space-xs: calc(var(--spacing-unit) * 0.5);
            --space-sm: var(--spacing-unit);
            --space-md: calc(var(--spacing-unit) * 1.5);
            --space-lg: calc(var(--spacing-unit) * 2.5);
            --space-xl: calc(var(--spacing-unit) * 4);
            --space-2xl: calc(var(--spacing-unit) * 6);
            --max-width: 1200px;
            --nav-height: 72px;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--color-background);
            color: var(--color-text);
            line-height: 1.6;
        }

        img {
            display: block;
            max-width: 100%;
            height: auto;
        }

        a {
            color: inherit;
            text-decoration: none;
            transition: color 0.25s;
            position: relative;
        }

        ul {
            list-style: none;
        }

        /* 导航栏（与首页完全一致） */
        .site-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            background: rgba(249, 248, 246, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            transition: background 0.3s;
        }

        .header-inner {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 var(--space-lg);
            height: var(--nav-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .site-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: var(--font-heading);
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            color: var(--color-text);
        }

        .site-logo img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            object-position: center;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: var(--space-lg);
        }

        .nav-links li a {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 500;
            color: var(--color-textMuted);
            padding: 0.25rem 0;
            background: transparent;
            border: none;
        }

        .nav-links li a:hover {
            color: var(--color-text);
        }

        .nav-links li.nav-cta-li a {
            background: transparent;
            border: 1px solid var(--color-accent);
            color: var(--color-text);
            padding: 0.5rem 1.25rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 500;
            transition: background 0.3s, color 0.3s;
            cursor: pointer;
        }

        .nav-links li.nav-cta-li a:hover {
            background: var(--color-accent);
            color: var(--color-surface);
        }

        /* gallery 特有样式 - grid 布局 */
        .gallery-page {
            padding-top: var(--nav-height);
        }

        .gallery-hero {
            text-align: center;
            padding: var(--space-2xl) var(--space-lg) var(--space-xl);
            max-width: 700px;
            margin: 0 auto;
        }

        .gallery-hero h1 {
            font-family: var(--font-heading);
            font-size: 3rem;
            font-weight: 600;
            color: var(--color-text);
            letter-spacing: 0.02em;
            line-height: 1.2;
            margin-bottom: var(--space-sm);
        }

        .gallery-hero p {
            font-size: 1.05rem;
            color: var(--color-textMuted);
            max-width: 500px;
            margin: 0 auto;
            line-height: 1.7;
        }

        /* 分类筛选 */
        .gallery-filters {
            display: flex;
            justify-content: center;
            gap: var(--space-sm);
            padding: 0 var(--space-lg) var(--space-lg);
            flex-wrap: wrap;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid var(--color-secondary);
            color: var(--color-textMuted);
            padding: 0.5rem 1.5rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.25s, color 0.25s, border-color 0.25s;
            font-family: var(--font-body);
            border-radius: 0;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--color-accent);
            border-color: var(--color-accent);
            color: var(--color-surface);
        }

        /* 瀑布流 grid */
        .gallery-grid {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 var(--space-lg) var(--space-2xl);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-md);
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            cursor: pointer;
            background: var(--color-surface);
            transition: box-shadow 0.3s;
            display: flex;
            flex-direction: column;
        }

        .gallery-item:hover {
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        }

        .gallery-item .img-wrapper {
            width: 100%;
            overflow: hidden;
            position: relative;
            aspect-ratio: 3 / 4;
        }

        .gallery-item .img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease, filter 0.4s;
            filter: grayscale(0.15) brightness(0.95);
        }

        .gallery-item:hover .img-wrapper img {
            transform: scale(1.04);
            filter: grayscale(0) brightness(1);
        }

        .gallery-item .item-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: var(--space-md);
            background: linear-gradient(to top, rgba(0, 0, 0, 0.5), transparent);
            color: #fff;
            opacity: 0;
            transition: opacity 0.35s;
        }

        .gallery-item:hover .item-overlay {
            opacity: 1;
        }

        .gallery-item .item-overlay h3 {
            font-family: var(--font-heading);
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 0.15rem;
        }

        .gallery-item .item-overlay span {
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            opacity: 0.8;
        }

        .gallery-item .item-info {
            padding: var(--space-sm) var(--space-xs);
            text-align: center;
        }

        .gallery-item .item-info h3 {
            font-family: var(--font-heading);
            font-size: 1rem;
            font-weight: 500;
            color: var(--color-text);
            margin-bottom: 0.1rem;
        }

        .gallery-item .item-info .category-tag {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--color-textMuted);
        }

        /* 详情弹窗模态 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            z-index: 200;
            justify-content: center;
            align-items: center;
            padding: var(--space-lg);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--color-surface);
            max-width: 720px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            position: relative;
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }}
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-close {
            position: absolute;
            top: var(--space-sm);
            right: var(--space-sm);
            background: transparent;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--color-textMuted);
            z-index: 10;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }

        .modal-close:hover {
            color: var(--color-text);
        }

        .modal-content .modal-img {
            width: 100%;
            max-height: 50vh;
            object-fit: cover;
        }

        .modal-body {
            padding: var(--space-lg);
        }

        .modal-body h2 {
            font-family: var(--font-heading);
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--color-text);
            margin-bottom: var(--space-xs);
        }

        .modal-body .modal-category {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--color-accent);
            margin-bottom: var(--space-sm);
        }

        .modal-body p {
            color: var(--color-textMuted);
            line-height: 1.8;
            font-size: 0.95rem;
        }

        /* Footer */
        .site-footer {
            background: var(--color-primary);
            color: rgba(255, 255, 255, 0.7);
            padding: var(--space-xl) var(--space-lg) var(--space-lg);
        }

        .footer-inner {
            max-width: var(--max-width);
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: flex-start;
            gap: var(--space-lg);
        }

        .footer-brand {
            flex: 1 1 220px;
        }

        .footer-brand .footer-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font-heading);
            font-size: 1rem;
            color: #fff;
            margin-bottom: var(--space-sm);
        }

        .footer-brand .footer-logo img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
        }

        .footer-brand p {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.6;
        }

        .footer-links {
            display: flex;
            gap: var(--space-xl);
            flex-wrap: wrap;
        }

        .footer-links .col h4 {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: var(--space-sm);
            font-weight: 500;
        }

        .footer-links .col a {
            display: block;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: var(--space-xs);
            transition: color 0.25s;
            background: transparent;
            border: none;
            padding: 0;
            text-transform: none;
            letter-spacing: normal;
        }

        .footer-links .col a:hover {
            color: #fff;
        }

        .footer-bottom {
            max-width: var(--max-width);
            margin: var(--space-lg) auto 0;
            padding-top: var(--space-md);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.35);
            flex-wrap: wrap;
            gap: var(--space-sm);
        }

        .footer-bottom .social-links {
            display: flex;
            gap: var(--space-sm);
        }

        .footer-bottom .social-links a {
            width: 36px;
            height: 36px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            transition: border-color 0.25s, color 0.25s;
            background: transparent;
            padding: 0;
            text-transform: none;
            letter-spacing: normal;
        }

        .footer-bottom .social-links a:hover {
            border-color: var(--color-accent);
            color: var(--color-accent);
        }

        /* Responsive */
        @media (max-width: 900px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: var(--space-sm);
            }

            .header-inner {
                padding: 0 var(--space-md);
            }

            .nav-links {
                gap: var(--space-md);
            }
        }

        @media (max-width: 600px) {
            .gallery-grid {
                grid-template-columns: 1fr;
                gap: var(--space-sm);
                padding: 0 var(--space-sm) var(--space-xl);
            }

            .gallery-hero h1 {
                font-size: 2rem;
            }

            .gallery-hero {
                padding: var(--space-xl) var(--space-sm) var(--space-lg);
            }

            .gallery-filters {
                padding: 0 var(--space-sm) var(--space-md);
                gap: var(--space-xs);
            }

            .filter-btn {
                padding: 0.4rem 1rem;
                font-size: 0.65rem;
            }

            .site-header .nav-links li:not(.nav-cta-li) {
                display: none;
            }

            .footer-inner {
                flex-direction: column;
                gap: var(--space-md);
            }

            .footer-bottom {
                flex-direction: column;
                text-align: center;
            }

            .modal-content {
                max-height: 95vh;
            }

            .modal-body {
                padding: var(--space-md);
            }
        }
    </style>
</head>

                    story: '午后阳光穿透树冠，在地面洒下斑驳光晕。她在林间漫步，像一首流动的诗。'
                },
                {
                    id: 4,
                    title: '窗与几何',
                    category: 'space',
                    categoryLabel: '空间',
                    img: 'https://images.pexels.com/photos/28178704/pexels-photo-28178704.jpeg?auto=compress&cs=tinysrgb&h=650&w=940',
                    story: '建筑是凝固的音乐。这扇窗以极简的线条框住一片天空，光影在室内缓慢游移，形成静谧的几何诗篇。'
                },
                {
                    id: 5,
                    title: '静谧之夜',
                    category: 'still-life',
                    categoryLabel: '静物',
                    img: 'https://images.pexels.com/photos/10879787/pexels-photo-10879787.jpeg?auto=compress&cs=tinysrgb&h=650&w=940',
                    story: '夜晚的灯光下，玻璃器皿折射出温柔的光晕。静物之美，在于它能将瞬间的宁静凝固为永恒。'
                },
                {
                    id: 6,
                    title: '城市缝隙',
                    category: 'space',
                    categoryLabel: '空间',
                    img: 'https://images.pexels.com/photos/8960464/pexels-photo-8960464.jpeg?auto=compress&cs=tinysrgb&h=650&w=940',
                    story: '在都市的夹缝中寻找秩序与空寂。线条、材质与阴影构成属于城市的独特语言。'
                },
                {
                    id: 7,
                    title: '风与发丝',
                    category: 'portrait',
                    categoryLabel: '人像',
                    img: 'https://images.pexels.com/photos/6190326/pexels-photo-6190326.jpeg?auto=compress&cs=tinysrgb&h=650&w=940',
                    story: '海风扬起发丝的瞬间，自由有了形状。人像摄影的本质，是捕捉灵魂的片刻游离。'
                },
                {
                    id: 8,
                    title: '日常的仪式',
                    category: 'still-life',
                    categoryLabel: '静物',
                    img: 'https://images.pexels.com/photos/16029826/pexels-photo-16029826.jpeg?auto=compress&cs=tinysrgb&h=350',
                    story: '一杯咖啡，一本书，一段无人打扰的午后。平凡日常里藏着的仪式感，值得被认真记录。'
                },
                {
                    id: 9,
                    title: '光影走廊',
                    category: 'space',
                    categoryLabel: '空间',
                    img: 'https://images.pexels.com/photos/12162522/pexels-photo-12162522.jpeg?auto=compress&cs=tinysrgb&h=650&w=940',
                    story: '长廊尽头，光与影构成强烈的透视。空间摄影是关于氛围的营造，让观者仿佛能听见脚步的回响。'
                }
            ];

            const grid = document.getElementById('galleryGrid');
            const filterBtns = document.querySelectorAll('.filter-btn');
            const modalOverlay = document.getElementById('modalOverlay');
            const modalImg = document.getElementById('modalImg');
            const modalTitle = document.getElementById('modalTitle');
            const modalCategory = document.getElementById('modalCategory');
            const modalStory = document.getElementById('modalStory');
            const modalClose = document.getElementById('modalCloseBtn');
            let currentFilter = 'all';

            function renderGallery(filter) {
                const filtered = filter === 'all' ? galleryData : galleryData.filter(item => item.category === filter);
                grid.innerHTML = '';
                filtered.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'gallery-item';
                    div.dataset.id = item.id;
                    div.innerHTML = `
                        <div class="img-wrapper">
                            <img src="${item.img}" alt="${item.title}" loading="lazy">
                            <div class="item-overlay">
                                <h3>${item.title}</h3>
                                <span>查看详情</span>
                            </div>
                        </div>
                        <div class="item-info">
                            <h3>${item.title}</h3>
                            <span class="category-tag">${item.categoryLabel}</span>
                        </div>
                    `;
                    div.addEventListener('click', function(e) {
                        openModal(item);
                    });
                    grid.appendChild(div);
                });
            }

            function openModal(item) {
                modalImg.src = item.img;
                modalImg.alt = item.title;
                modalTitle.textContent = item.title;
                modalCategory.textContent = item.categoryLabel;
                modalStory.textContent = item.story;
                modalOverlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            function closeModal() {
                modalOverlay.classList.remove('active');
                document.body.style.overflow = '';
            }

            filterBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentFilter = this.dataset.filter;
                    renderGallery(currentFilter);
                });
            });

            modalClose.addEventListener('click', closeModal);
            modalOverlay.addEventListener('click', function(e) {
                if (e.target === this) {
                    closeModal();
                }
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    closeModal();
                }
            });

            // 初始渲染
            renderGallery('all');
        })();
    </script>
</body>
</html>
