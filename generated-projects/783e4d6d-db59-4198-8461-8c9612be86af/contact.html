<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系 - 光影叙事</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #2C3E50;
            --color-secondary: #D4AF37;
            --color-background: #F8F9FA;
            --color-surface: #FFFFFF;
            --color-text: #2D3436;
            --color-textMuted: #636E72;
            --color-accent: #E17055;
            --font-heading: 'Playfair Display', Georgia, serif;
            --font-body: 'Lato', system-ui, sans-serif;
            --spacing-unit: 8px;
        }
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: var(--font-body);
            color: var(--color-text);
            background-color: var(--color-background);
            line-height: 1.6;
        }
        img {
            display: block;
            max-width: 100%;
            height: auto;
        }
        a {
            text-decoration: none;
            color: inherit;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 calc(var(--spacing-unit) * 3);
        }

        /* ---- 导航栏 ---- */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            background: rgba(44, 62, 80, 0.92);
            backdrop-filter: blur(6px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.25);
        }
        .navbar .container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: calc(var(--spacing-unit) * 5);
            padding-top: calc(var(--spacing-unit) * 2);
            padding-bottom: calc(var(--spacing-unit) * 2);
        }
        .navbar a {
            font-family: var(--font-body);
            font-weight: 400;
            font-size: 0.95rem;
            letter-spacing: 0.06em;
            color: rgba(255, 255, 255, 0.8);
            transition: color 0.2s;
            position: relative;
            text-transform: uppercase;
        }
        .navbar a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -4px;
            width: 0;
            height: 2px;
            background: var(--color-secondary);
            transition: width 0.3s;
        }
        .navbar a:hover::after,
        .navbar a.active::after {
            width: 100%;
        }
        .navbar a:hover {
            color: var(--color-secondary);
        }
        .navbar a.active {
            color: var(--color-secondary);
        }

        /* ---- 页面独有布局: form ---- */
        .contact-hero {
            margin-top: 72px;
            position: relative;
            width: 100%;
            height: 50vh;
            min-height: 300px;
            overflow: hidden;
        }
        .contact-hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .contact-hero .overlay {
            position: absolute;
            inset: 0;
            background: rgba(44, 62, 80, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: #fff;
        }
        .contact-hero .overlay h1 {
            font-family: var(--font-heading);
            font-size: 3.2rem;
            font-weight: 400;
            letter-spacing: 0.08em;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .contact-hero .overlay p {
            font-family: var(--font-body);
            font-size: 1.1rem;
            letter-spacing: 0.14em;
            color: rgba(255,255,255,0.85);
            margin-top: calc(var(--spacing-unit) * 2);
        }

        .contact-section {
            padding: calc(var(--spacing-unit) * 12) 0 calc(var(--spacing-unit) * 8);
            background: var(--color-background);
        }
        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: calc(var(--spacing-unit) * 8);
            align-items: start;
        }

        /* 左侧信息 */
        .contact-info {
            padding: calc(var(--spacing-unit) * 4) 0;
        }
        .contact-info h2 {
            font-family: var(--font-heading);
            font-size: 2rem;
            font-weight: 400;
            color: var(--color-primary);
            margin-bottom: calc(var(--spacing-unit) * 3);
            letter-spacing: 0.04em;
        }
        .contact-info .info-block {
            margin-bottom: calc(var(--spacing-unit) * 4);
        }
        .contact-info .info-block h3 {
            font-family: var(--font-body);
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--color-secondary);
            margin-bottom: calc(var(--spacing-unit) * 1);
        }
        .contact-info .info-block p {
            font-family: var(--font-body);
            font-size: 1rem;
            color: var(--color-textMuted);
            line-height: 1.8;
        }
        .contact-info .info-block a {
            font-family: var(--font-body);
            font-size: 1rem;
            color: var(--color-textMuted);
            transition: color 0.2s;
        }
        .contact-info .info-block a:hover {
            color: var(--color-secondary);
        }

        .social-links {
            display: flex;
            gap: calc(var(--spacing-unit) * 4);
            margin-top: calc(var(--spacing-unit) * 4);
        }
        .social-links a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border: 1px solid rgba(44, 62, 80, 0.15);
            border-radius: 50%;
            color: var(--color-primary);
            font-size: 1rem;
            font-weight: 700;
            transition: all 0.3s;
            font-family: var(--font-body);
            letter-spacing: 0.06em;
        }
        .social-links a:hover {
            background: var(--color-secondary);
            color: var(--color-surface);
            border-color: var(--color-secondary);
        }

        /* 右侧表单 */
        .contact-form-wrap {
            background: var(--color-surface);
            padding: calc(var(--spacing-unit) * 6);
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(44,62,80,0.06);
        }
        .contact-form-wrap h3 {
            font-family: var(--font-heading);
            font-size: 1.6rem;
            font-weight: 400;
            color: var(--color-primary);
            margin-bottom: calc(var(--spacing-unit) * 4);
            letter-spacing: 0.02em;
        }
        .form-group {
            margin-bottom: calc(var(--spacing-unit) * 3);
        }
        .form-group label {
            display: block;
            font-family: var(--font-body);
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--color-textMuted);
            margin-bottom: calc(var(--spacing-unit) * 1);
        }
        .form-group input,
        .form-group textarea {
            font-family: var(--font-body);
            font-size: 1rem;
            padding: calc(var(--spacing-unit) * 1.5) calc(var(--spacing-unit) * 2);
            border: 1px solid rgba(44,62,80,0.15);
            background: var(--color-background);
            color: var(--color-text);
            transition: border-color 0.25s;
            width: 100%;
            border-radius: 2px;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--color-secondary);
        }
        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }
        .submit-btn {
            display: inline-flex;
            align-items: center;
            gap: calc(var(--spacing-unit) * 1);
            font-family: var(--font-body);
            font-size: 0.9rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--color-surface);
            background: var(--color-primary);
            border: none;
            padding: calc(var(--spacing-unit) * 2) calc(var(--spacing-unit) * 5);
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 2px;
        }
        .submit-btn:hover {
            background: var(--color-secondary);
            color: var(--color-primary);
        }

        /* 地图区块 */
        .map-section {
            padding: 0 0 calc(var(--spacing-unit) * 8);
            background: var(--color-background);
        }
        .map-section .container {
            max-width: 1200px;
        }
        .map-placeholder {
            width: 100%;
            height: 340px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-textMuted);
            font-family: var(--font-body);
            letter-spacing: 0.06em;
            font-size: 0.95rem;
            border: 1px solid rgba(44,62,80,0.08);
        }

        /* ---- Footer ---- */
        .footer {
            background: var(--color-primary);
            color: rgba(255, 255, 255, 0.8);
            padding: calc(var(--spacing-unit) * 6) 0;
            text-align: center;
            border-top: 1px solid rgba(212,175,55,0.2);
        }
        .footer .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: calc(var(--spacing-unit) * 2);
        }
        .footer-links {
            display: flex;
            gap: calc(var(--spacing-unit) * 4);
            flex-wrap: wrap;
            justify-content: center;
        }
        .footer-links a {
            font-family: var(--font-body);
            font-size: 0.85rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.7);
            transition: color 0.2s;
        }
        .footer-links a:hover {
            color: var(--color-secondary);
        }
        .footer p {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 0.04em;
            font-family: var(--font-body);
        }

        /* ---- 响应式 ---- */
        @media (max-width: 768px) {
            .navbar .container {
                gap: calc(var(--spacing-unit) * 3);
            }
            .navbar a {
                font-size: 0.8rem;
            }
            .contact-hero .overlay h1 {
                font-size: 2.2rem;
            }
            .contact-grid {
                grid-template-columns: 1fr;
                gap: calc(var(--spacing-unit) * 6);
            }
            .contact-form-wrap {
                padding: calc(var(--spacing-unit) * 4);
            }
            .social-links {
                gap: calc(var(--spacing-unit) * 3);
            }
            .footer-links {
                gap: calc(var(--spacing-unit) * 3);
            }
        }
    </style>
</head>
<body>

    <!-- 导航栏 (与首页完全一致的结构) -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html">首页</a>
            <a href="portfolio.html">作品集</a>
            <a href="about.html">关于</a>
            <a href="contact.html" class="active">联系</a>
        </div>
    </nav>

    <!-- Hero 视觉区 -->
    <section class="contact-hero">
        <img src="https://images.pexels.com/photos/12460102/pexels-photo-12460102.jpeg?auto=compress&cs=tinysrgb&h=650&w=940" alt="联系背景" loading="eager" />
        <div class="overlay">
            <h1>联络</h1>
            <p>用镜头书写你的故事</p>
        </div>
    </section>

    <!-- 联系信息 + 表单 -->
    <section class="contact-section">
        <div class="container">
            <div class="contact-grid">
                <!-- 左侧信息 -->
                <div class="contact-info">
                    <h2>工作室</h2>
                    <div class="info-block">
                        <h3>地址</h3>
                        <p>上海市黄浦区外滩街道四川中路181号<br>光影叙事摄影工作室 3F</p>
                    </div>
                    <div class="info-block">
                        <h3>电话</h3>
                        <p><a href="tel:+862134567890">+86 21 3456 7890</a></p>
                    </div>
                    <div class="info-block">
                        <h3>邮箱</h3>
                        <p><a href="mailto:hello@lightstory.cn">hello@lightstory.cn</a></p>
                    </div>
                    <div class="info-block">
                        <h3>营业时间</h3>
                        <p>周二至周六 09:30 – 18:00<br>周日需提前预约<br>周一休息</p>
                    </div>
                    <div class="social-links">
                        <a href="https://weibo.com" target="_blank" rel="noopener noreferrer">WB</a>
                        <a href="https://instagram.com" target="_blank" rel="noopener noreferrer">IG</a>
                        <a href="https://xiaohongshu.com" target="_blank" rel="noopener noreferrer">XHS</a>
                        <a href="https://douyin.com" target="_blank" rel="noopener noreferrer">DY</a>
                    </div>
                </div>

                <!-- 右侧联系表单 -->
                <div class="contact-form-wrap">
                    <h3>预约拍摄</h3>
                    <form action="#" method="post">
                        <div class="form-group">
                            <label for="name">你的姓名</label>
                            <input type="text" id="name" name="name" placeholder="请填写姓名" required>
                        </div>
                        <div class="form-group">
                            <label for="email">电子邮箱</label>
                            <input type="email" id="email" name="email" placeholder="your@email.com" required>
                        </div>
                        <div class="form-group">
                            <label for="intent">拍摄意向</label>
                            <textarea id="intent" name="intent" placeholder="请简要描述您想拍摄的风格 / 主题 / 人数 / 预期时间……" required></textarea>
                        </div>
                        <button type="submit" class="submit-btn">发送意向 · 预约</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- 地图信息 -->
    <section class="map-section">
        <div class="container">
            <div class="map-placeholder">
                <span>📍 上海市黄浦区 · 外滩 · 四川中路181号</span>
            </div>
        </div>
    </section>

    <!-- Footer (与首页一致的结构) -->
    <footer class="footer">
        <div class="container">
            <div class="footer-links">
                <a href="index.html">首页</a>
                <a href="portfolio.html">作品集</a>
                <a href="about.html">关于</a>
                <a href="contact.html">联系</a>
            </div>
            <p>&copy; 2025 光影叙事 · 人像摄影工作室</p>
        </div>
    </footer>

</body>
</html>
