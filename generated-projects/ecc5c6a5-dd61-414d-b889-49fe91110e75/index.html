<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>街头摄影 | Street Photography</title>
<style>
:root {
  --color-bg: #0a0a0a;
  --color-text: #f5f5f5;
  --color-text-muted: #888;
  --color-accent: #e2e2e2;
  --font-main: "Helvetica Neue", Helvetica, "PingFang SC", "Microsoft YaHei", sans-serif;
  --spacing-unit: 8px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--color-bg); color: var(--color-text); font-family: var(--font-main); line-height: 1.6; overflow-x: hidden; }
#mainNav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 24px 5%; display: flex; justify-content: space-between; align-items: center; transition: background 0.3s, padding 0.3s; }
#mainNav.scrolled { background: rgba(10,10,10,0.9); backdrop-filter: blur(10px); padding: 16px 5%; }
.nav-logo { color: var(--color-text); font-size: 1.2rem; font-weight: 500; letter-spacing: 0.1em; text-decoration: none; }
#navLinks { display: flex; gap: 32px; list-style: none; margin: 0; padding: 0; }
#navLinks a { color: var(--color-text-muted); text-decoration: none; font-size: 0.9rem; letter-spacing: 0.05em; transition: color 0.3s; }
#navLinks a:hover { color: var(--color-text); }
#navToggle { display: none; background: none; border: none; color: var(--color-text); font-size: 1.5rem; cursor: pointer; }
@media (max-width: 768px) {
  #navToggle { display: block; }
  #navLinks { position: fixed; top: 0; right: -100%; width: 70%; height: 100vh; background: var(--color-bg); flex-direction: column; justify-content: center; align-items: center; transition: right 0.4s ease; }
  #navLinks.open { right: 0; }
}
.hero { position: relative; width: 100%; height: 100vh; overflow: hidden; }
.hero-slide { position: absolute; inset: 0; opacity: 0; transition: opacity 1.2s ease; }
.hero-slide.active { opacity: 1; }
.hero-slide img { width: 100%; height: 100%; object-fit: cover; }
.hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 50%); }
.hero-content { position: absolute; bottom: 120px; left: 5%; z-index: 2; }
.hero-title { font-size: clamp(2rem, 5vw, 4rem); color: var(--color-text); margin: 0; font-weight: 300; letter-spacing: 0.05em; }
.hero-subtitle { font-size: clamp(1rem, 2vw, 1.5rem); color: var(--color-text-muted); margin: 8px 0 0; font-weight: 300; letter-spacing: 0.1em; text-transform: uppercase; }
.hero-meta { position: absolute; top: 50%; right: 5%; transform: translateY(-50%); z-index: 2; text-align: right; color: var(--color-text-muted); font-size: 0.85rem; letter-spacing: 0.15em; writing-mode: vertical-rl; }
.hero-meta-line { margin: 0 0 16px; }
.hero-indicators { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; z-index: 2; }
.hero-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,0.3); border: none; cursor: pointer; padding: 0; transition: all 0.3s; }
.hero-dot.active { background: #fff; transform: scale(1.3); }
.fade-in { opacity: 0; transform: translateY(20px); transition: opacity 0.8s ease, transform 0.8s ease; }
.fade-in.visible { opacity: 1; transform: translateY(0); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
