<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary: #A88A75;
      --color-secondary: #7A8B8C;
      --color-background: #F4EFEA;
      --color-surface: #EBE4DA;
      --color-text: #3D3832;
      --color-textMuted: #8C7E6F;
      --color-accent: #C9A86E;
      --font-heading: 'Cormorant Garamond', serif;
      --font-body: 'Lora', serif;
      --spacing-unit: 8px;
    }
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html {
      scroll-behavior: smooth;
      font-size: 16px;
    }
    body {
      font-family: var(--font-body);
      color: var(--color-text);
      background-color: var(--color-background);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }
    a {
      color: inherit;
      text-decoration: none;
      transition: color 0.3s ease;
    }
    img {
      display: block;
      max-width: 100%;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    ul {
      list-style: none;
    }
    button {
      border: none;
      background: none;
      cursor: pointer;
      font-family: inherit;
      color: inherit;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: calc(var(--spacing-unit) * 3) calc(var(--spacing-unit) * 6);
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(244, 239, 234, 0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(168, 138, 117, 0.15);
    }
    .nav-brand {
      font-family: var(--font-heading);
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--color-text);
      letter-spacing: 0.06em;
    }
    .nav-links {
      display: flex;
      gap: calc(var(--spacing-unit) * 5);
    }
    .nav-links a {
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: var(--color-textMuted);
      position: relative;
      padding-bottom: 4px;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--color-primary);
      transition: width 0.3s ease;
    }
    .nav-links a:hover::after,
    .nav-links a.active::after {
      width: 100%;
    }
    .nav-links a.active {
      color: var(--color-text);
    }
    .nav-toggle {
      display: none;
      flex-direction: column;
      gap: 5px;
      padding: 4px;
    }
    .nav-toggle span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--color-text);
      transition: 0.3s;
    }

    .gallery-page {
      min-height: 100vh;
      padding-bottom: calc(var(--spacing-unit) * 6);
    }
    .page-header {
      text-align: center;
      padding: calc(var(--spacing-unit) * 10) calc(var(--spacing-unit) * 4) calc(var(--spacing-unit) * 6);
    }
    .page-header h1 {
      font-family: var(--font-heading);
      font-size: 3.8rem;
      font-weight: 300;
      color: var(--color-text);
      margin-bottom: calc(var(--spacing-unit) * 2);
      letter-spacing: 0.08em;
    }
    .page-subtitle {
      font-size: 1.05rem;
      color: var(--color-textMuted);
      font-style: italic;
      max-width: 620px;
      margin: 0 auto;
      line-height: 1.8;
    }

    .filter-bar {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: calc(var(--spacing-unit) * 2);
      margin-bottom: calc(var(--spacing-unit) * 6);
      padding: 0 calc(var(--spacing-unit) * 4);
    }
    .filter-btn {
      padding: calc(var(--spacing-unit) * 1) calc(var(--spacing-unit) * 3);
      font-size: 0.85rem;
      color: var(--color-textMuted);
      letter-spacing: 0.06em;
      border: 1px solid transparent;
      border-radius: 2px;
      transition: all 0.3s ease;
    }
    .filter-btn:hover,
    .filter-btn.active {
      color: var(--color-text);
      border-color: var(--color-primary);
      background: rgba(168, 138, 117, 0.12);
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: calc(var(--spacing-unit) * 5);
      padding: 0 calc(var(--spacing-unit) * 6);
      max-width: 1440px;
      margin: 0 auto;
    }
    .gallery-item {
      display: flex;
      flex-direction: column;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .gallery-item.hidden {
      opacity: 0;
      pointer-events: none;
      position: absolute;
      visibility: hidden;
      transform: scale(0.95);
    }

    .film-frame {
      position: relative;
      background: #FDFBF7;
      padding: calc(var(--spacing-unit) * 2.5);
      box-shadow: 0 6px 16px rgba(61, 56, 50, 0.08);
      cursor: pointer;
      overflow: hidden;
    }
    .film-frame::before,
    .film-frame::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      height: 16px;
      background-image: radial-gradient(circle, var(--color-textMuted) 2px, transparent 2.5px);
      background-size: 14px 16px;
      background-position: center;
      opacity: 0.25;
      pointer-events: none;
    }
    .film-frame::before { top: 3px; }
    .film-frame::after { bottom: 3px; }
    .film-frame img {
      aspect-ratio: 3 / 4;
      transition: transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.6s ease;
      filter: saturate(0.82) contrast(1.04) sepia(0.08);
    }
    .film-frame:hover img {
      transform: scale(1.03);
      filter: saturate(0.92) contrast(1.08) sepia(0.04);
    }
    .film-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(to bottom, rgba(0,0,0,0.01), rgba(0,0,0.06));
      mix-blend-mode: multiply;
    }

    .item-info {
      margin-top: calc(var(--spacing-unit) * 2.5);
      text-align: center;
    }
    .item-cat {
      display: block;
      font-size: 0.7rem;
      color: var(--color-accent);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 6px;
    }
    .item-info h3 {
      font-family: var(--font-heading);
      font-size: 1.3rem;
      font-weight: 400;
      color: var(--color-text);
      letter-spacing: 0.04em;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(45, 40, 35, 0.94);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.4s ease, visibility 0.4s ease;
      backdrop-filter: blur(6px);
    }
    .lightbox.open {
      opacity: 1;
      visibility: visible;
    }
    .lightbox-content {
      max-width: 92vw;
      max-height: 88vh;
      position: relative;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .lightbox-content img {
      max-height: 78vh;
      width: auto;
      max-width: 100%;
      object-fit: contain;
      box-shadow: 0 12px 36px rgba(0,0,0,0.35);
      border: 10px solid #FDFBF7;
    }
    .lightbox-caption {
      margin-top: calc(var(--spacing-unit) * 3);
      color: #EBE4DA;
      font-family: var(--font-heading);
      font-size: 1.15rem;
      letter-spacing: 0.06em;
    }
    .lightbox-close {
      position: absolute;
      top: 24px;
      right: 24px;
      color: #EBE4DA;
      font-size: 2.2rem;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s ease;
      z-index: 1001;
    }
    .lightbox-close:hover {
      transform: rotate(90deg);
    }

    .footer {
      text-align: center;
      padding: calc(var(--spacing-unit) * 8) calc(var(--spacing-unit) * 4);
      border-top: 1px solid rgba(168, 138, 117, 0.2);
      margin-top: calc(var(--spacing-unit) * 8);
    }
    .footer p {
      font-size: 0.8rem;
      color: var(--color-textMuted);
      margin-bottom: calc(var(--spacing-unit) * 2);
    }
    .footer-links {
      display: flex;
      justify-content: center;
      gap: calc(var(--spacing-unit) * 4);
    }
    .footer-links a {
      font-size: 0.8rem;
      color: var(--color-textMuted);
      transition: color 0.3s ease;
    }
    .footer-links a:hover {
      color: var(--color-primary);
    }

    @media (max-width: 768px) {
      .nav-links {
        display: none;
        position: absolute;
        top: 100%;
        right: 0;
        left: 0;
        background: var(--color-surface);
        flex-direction: column;
        padding: calc(var(--spacing-unit) * 3);
        gap: calc(var(--spacing-unit) * 2);
        box-shadow: 0 6px 16px rgba(0,0,0,0.06);
      }
      .nav-links.open {
        display: flex;
      }
      .nav-toggle {
        display: flex;
      }
      .page-header h1 {
        font-size: 2.6rem;
      }
      .gallery-grid {
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: calc(var(--spacing-unit) * 3);
        padding: 0 calc(var(--spacing-unit) * 3);
      }
    }
  </style>
</head>
<body>
  <nav class="nav" id="nav">
    <a href="index.html" class="nav-brand">林叙</a>
    <ul class="nav-links" id="navLinks">
      <li><a href="gallery.html" class="active">作品</a></li>
      <li><a href="blog.html">日记</a></li>
      <li><a href="about.html">关于</a></li>
      <li><a href="contact.html">联系</a></li>
    </ul>
    <button class="nav-toggle" id="navToggle" aria-label="菜单">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>

  <main class="gallery-page">
    <header class="page-header">
      <h1>光影叙事</h1>
      <p class="page-subtitle">定格瞬间的温度，在胶片颗粒中寻找时间的痕迹。每一帧都是与生活的一次安静对话。</p>
    </header>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">全部</button>
      <button class="filter-btn" data-filter="portrait">人像</button>
      <button class="filter-btn" data-filter="landscape">风景</button>
      <button class="filter-btn" data-filter="street">街拍</button>
      <button class="filter-btn" data-filter="film">胶片</button>
    </div>

    <section class="gallery-grid" id="galleryGrid">
      <div class="gallery-item" data-category="portrait">
        <div class="film-frame">
          <img src="https://images.pexels.com/photos/12761139/pexels-photo-12761139.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940" alt="人像作品 1" loading="lazy">
          <div class="film-overlay"></div>
        </div>
        <div class="item-info">
          <span class="item-cat">人像</span>
          <h3>午后微光</h3>
        </div>
      </div>
      <div class="gallery-item" data-category="landscape">
        <div class="film-frame">
          <img src="https://images.pexels.com/photos/36933577/pexels-photo-36933577.jpeg?auto=compress&cs=tinysrgb&h=650&w=940" alt="风景作品 1" loading="lazy">
          <div class="film-overlay"></div>
        </div>
        <div class="item-info">
          <span class="item-cat">风景</span>
          <h3>远山如黛</h3>
        </div>
      </div>
      <div class="gallery-item" data-category="street">
        <div class="film-frame">
          <img src="https://images.pexels.com/photos/2084275/pexels-photo-2084275.jpeg?auto=compress&cs=tinysrgb&h=650&w=940" alt="街拍作品 1" loading="lazy">
          <div class="film-overlay"></div>
        </div>
        <div class="item-info">
          <span class="item-cat">街拍</span>
          <h3>街角偶遇</h3>
        </div>
      </div>
      <div class="gallery-item" data-category="film">
        <div class="film-frame">
          <img src="https://images.pexels.com/photos/17368985/pexels-photo-17368985.jpeg?auto=compress&cs=tinysrgb&h=650&w=940" alt="胶片作品 1" loading="lazy">
          <div class="film-overlay"></div>
        </div>
        <div class="item-info">
          <span class="item-cat">胶片</span>
          <h3>旧日时光</h3>
        </div>
      </div>
      <div class="gallery-item" data-category="portrait">
        <div class="film-frame">
          <img src="https://images.pexels.com/photos/33645190/pexels-photo-33645190.jpeg?auto=compress&cs=tinysrgb&h=650&w=940" alt="人像作品 2" loading="lazy">
          <div class="film-overlay"></div>
        </div>
        <div class="item-info">
          <span class="item-cat">人像</span>
          <h3>凝视</h3>
        </div>
      </div>
      <div class="gallery-item" data-category="landscape">
        <div class="film-frame">
          <img src="https://images.pexels.com/photos/12761139/pexels-photo-12761139.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940" alt="风景作品 2" loading="lazy">
          <div class="film-overlay"></div>
        </div>
        <div class="item-info">
          <span class="item-cat">风景</span>
          <h3>晨雾弥漫</h3>
        </div>
      </div>
      <div class="gallery-item" data-category="street">
        <div class="film-frame">
          <img src="https://images.pexels.com/photos/36933577/pexels-photo-36933577.jpeg?auto=compress&cs=tinysrgb&h=650&w=940" alt="街拍作品 2" loading="lazy">
          <div class="film-overlay"></div>
        </div>
        <div class="item-info">
          <span class="item-cat">街拍</span>
          <h3>城市脉搏</h3>
        </div>
      </div>
      <div class="gallery-item" data-category="film">
        <div class="film-frame">
          <img src="https://images.pexels.com/photos/2084275/pexels-photo-2084275.jpeg?auto=compress&cs=tinysrgb&h=650&w=940" alt="胶片作品 2" loading="lazy">
          <div class="film-overlay"></div>
        </div>
        <div class="item-info">
          <span class="item-cat">胶片</span>
          <h3>颗粒记忆</h3>
        </div>
      </div>
    </section>
  </main>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">&times;</button>
    <div class="lightbox-content">
      <img id="lightboxImg" src="" alt="">
      <div class="lightbox-caption" id="lightboxCaption"></div>
    </div>
  </div>

  <footer class="footer">
    <p>&copy; 2024 林叙摄影. 保留所有权利.</p>
    <div class="footer-links">
      <a href="index.html">首页</a>
      <a href="gallery.html">作品</a>
      <a href="blog.html">日记</a>
      <a href="about.html">关于</a>
      <a href="contact.html">联系</a>
    </div>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const filterBtns = document.querySelectorAll('.filter-btn');
      const items = document.querySelectorAll('.gallery-item');

      filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          filterBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const filter = btn.dataset.filter;

          items.forEach(item => {
            if (filter === 'all' || item.dataset.category === filter) {
              item.classList.remove('hidden');
              item.style.position = 'relative';
              item.style.visibility = 'visible';
            } else {
              item.classList.add('hidden');
              item.style.position = 'absolute';
              item.style.visibility = 'hidden';
            }
          });
        });
      });

      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightboxImg');
      const lightboxCaption = document.getElementById('lightboxCaption');
      const lightboxClose = document.getElementById('lightboxClose');
      const frames = document.querySelectorAll('.film-frame');

      frames.forEach(frame => {
        frame.addEventListener('click', () => {
          const img = frame.querySelector('img');
          const info = frame.parentElement.querySelector('.item-info');
          const title = info.querySelector('h3').textContent;
          const cat = info.querySelector('.item-cat').textContent;

          lightboxImg.src = img.src;
          lightboxCaption.textContent = `${cat} / ${title}`;
          lightbox.classList.add('open');
          document.body.style.overflow = 'hidden';
        });
      });

      const closeLightbox = () => {
        lightbox.classList.remove('open');
        document.body.style.overflow = '';
      };

      lightboxClose.addEventListener('click', closeLightbox);
      lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox) closeLightbox();
      });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeLightbox();
      });

      const navToggle = document.getElementById('navToggle');
      const navLinks = document.getElementById('navLinks');
      navToggle.addEventListener('click', () => {
        navLinks.classList.toggle('open');
      });
    });
  </script>
</body>
</html>
