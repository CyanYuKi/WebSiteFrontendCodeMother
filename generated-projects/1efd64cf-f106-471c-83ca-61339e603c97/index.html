<!DOCTYPE html>
<html lang="zh-CN">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>远山集 · 风光摄影</title>
 <link rel="preconnect" href="https://fonts.googleapis.com">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,200;9..40,300;9..40,400&display=swap" rel="stylesheet">
 <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --color-primary: #7D6B5D;
      --color-secondary: #9DA896;
      --color-background: #FAF8F5;
      --color-surface: #FFFFFF;
      --color-text: #2B2826;
      --color-textMuted: #7A746C;
      --color-accent: #C9A67C;
      --font-heading: 'Cormorant Garamond', serif;
      --font-body: 'DM Sans', sans-serif;
      --spacing-unit: 1rem;
      --max-width: 1200px;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--color-background);
      color: var(--color-text);
      font-family: var(--font-body);
      font-weight: 300;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    img { display: block; max-width: 100%; height: auto; }

    a { color: inherit; text-decoration: none; transition: opacity 0.3s; }
    a:hover { opacity: 0.7; }

    h1, h2, h3, h4 {
      font-family: var(--font-heading);
      font-weight: 400;
      letter-spacing: 0.02em;
      line-height: 1.2;
    }

    .container {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* ---- Header / 极简导航 ---- */
    .site-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: transparent;
      padding: 2rem 2rem;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      pointer-events: none;
    }
    .site-header nav {
      pointer-events: auto;
      display: flex;
      gap: 2.5rem;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--color-surface);
      mix-blend-mode: difference;
      font-weight: 300;
    }
    .site-header nav a { opacity: 0.8; }
    .site-header nav a:hover { opacity: 1; }

    /* ---- Hero 全屏沉浸 ---- */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 600px;
      overflow: hidden;
      background: var(--color-text);
    }
    .hero img {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.75;
      transition: transform 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .hero:hover img { transform: scale(1.03); }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(43,40,38,0.5) 0%, transparent 50%);
    }
    .hero-content {
      position: absolute;
      bottom: 5rem;
      left: 2rem;
      right: 2rem;
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
      color: var(--color-surface);
    }
    .hero-content h1 {
      font-size: clamp(2.8rem, 7vw, 5rem);
      font-weight: 300;
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
      text-shadow: 0 2px 20px rgba(0,0,0,0.2);
    }
    .hero-content p {
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      opacity: 0.85;
      font-weight: 200;
      max-width: 480px;
      margin: 0 auto;
    }
    .hero-scroll {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      color: var(--color-surface);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.6;
      animation: pulseUp 2.4s ease-in-out infinite;
    }
    @keyframes pulseUp {
      0%, 100% { transform: translateX(-50%) translateY(0); opacity: 0.5; }}
      50% { transform: translateX(-50%) translateY(-6px); opacity: 0.9; }
    }

    /* ---- 作品画廊 (大图留白沉浸) ---- */
    .gallery-section {
      padding: 5rem 0 3rem;
    }
    .gallery-section .container {
      max-width: 1000px;
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2.5rem;
    }
    .gallery-item {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 5;
      overflow: hidden;
      background: var(--color-surface);
      cursor: pointer;
      transition: box-shadow 0.5s ease;
    }
    .gallery-item:hover {
      box-shadow: 0 20px 40px rgba(43,40,38,0.08);
    }
    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .gallery-item:hover img { transform: scale(1.02); }
    .gallery-item:nth-child(even) { aspect-ratio: 5 / 4; }
    .gallery-caption {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 2rem 1.5rem 1.2rem;
      background: linear-gradient(transparent, rgba(43,40,38,0.3));
      color: var(--color-surface);
      font-family: var(--font-heading);
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      opacity: 0;
      transition: opacity 0.5s;
    }
    .gallery-item:hover .gallery-caption { opacity: 1; }

    /* ---- 关于摄影师 ---- */
    .about-section {
      padding: 5rem 0 6rem;
      background: var(--color-surface);
    }
    .about-section .container {
      max-width: 900px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem 4rem;
      align-items: center;
    }
    .about-image {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 4;
      overflow: hidden;
    }
    .about-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .about-content {
      padding: 0.5rem 0;
    }
    .about-content h2 {
      font-size: 2.4rem;
      margin-bottom: 0.4rem;
      color: var(--color-primary);
      font-weight: 300;
    }
    .about-content .subhead {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--color-textMuted);
      margin-bottom: 1.8rem;
    }
    .about-content p {
      color: var(--color-textMuted);
      font-size: 0.95rem;
      margin-bottom: 1rem;
      text-wrap: pretty;
      line-height: 1.8;
    }
    .about-content .signature {
      font-family: var(--font-heading);
      font-size: 1.3rem;
      color: var(--color-accent);
      margin-top: 2rem;
      font-style: italic;
    }

    /* ---- 联系 / CTA ---- */
    .contact-section {
      padding: 4rem 0 3rem;
      text-align: center;
    }
    .contact-section .container {
      max-width: 700px;
    }
    .contact-section h2 {
      font-size: 1.8rem;
      color: var(--color-primary);
      margin-bottom: 0.8rem;
      font-weight: 300;
    }
    .contact-section p {
      color: var(--color-textMuted);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    .contact-cta {
      display: inline-block;
      padding: 0.8rem 2.5rem;
      border: 1px solid var(--color-primary);
      color: var(--color-primary);
      font-family: var(--font-body);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      transition: background 0.3s, color 0.3s;
    }
    .contact-cta:hover {
      background: var(--color-primary);
      color: var(--color-surface);
      opacity: 1;
    }

    /* ---- Footer ---- */
    .site-footer {
      padding: 2rem 2rem 1.5rem;
      border-top: 1px solid rgba(125,107,93,0.12);
      text-align: center;
    }
    .site-footer .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      font-size: 0.75rem;
      color: var(--color-textMuted);
      letter-spacing: 0.05em;
    }
    .site-footer a {
      margin-left: 1.5rem;
    }
    .site-footer .social a {
      margin-left: 0.8rem;
      margin-right: 0.8rem;
      font-size: 0.7rem;
      text-transform: uppercase;
    }

    /* ---- Lightbox (React) ---- */
    .lightbox-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
      backdrop-filter: blur(4px);
      padding: 2rem;
    }
    .lightbox-overlay img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
    }

    /* ---- 响应式 ---- */
    @media (max-width: 768px) {
      .site-header {
        padding: 1.5rem 1.2rem;
        justify-content: center;
      }
      .site-header nav { gap: 1.5rem; font-size: 0.7rem; }
      .hero-content { bottom: 4rem; left: 1.5rem; right: 1.5rem; }
      .about-section .container {
        grid-template-columns: 1fr;
        gap: 2rem;
      }
      .about-image { aspect-ratio: 4 / 3; }
      .site-footer .container { flex-direction: column; }
    }
 </style>
</head>
<body>

 <!-- Header 极简导航 -->
 <header class="site-header">
    <nav>
      <a href="index.html">作品</a>
      <a href="about.html">关于</a>
      <a href="gallery.html">画廊</a>
      <a href="contact.html">联系</a>
    </nav>
 </header>

 <!-- Hero 全屏主视觉 -->
 <section class="hero">
    <img src="https://images.pexels.com/photos/8774733/pexels-photo-8774733.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940" alt="远山与晨雾" loading="eager" width="5464" height="3640">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1>远山集</h1>
      <p>山峦不语 &nbsp;·&nbsp; 光影为诗</p>
    </div>
    <div class="hero-scroll">卷动探索</div>
 </section>

 <!-- 作品画廊 (大图留白) -->
 <section class="gallery-section">
    <div class="container">
      <div class="gallery-grid" id="galleryRoot"></div>
    </div>
 </section>

 <!-- 关于摄影师 -->
 <section class="about-section">
    <div class="container">
      <div class="about-image">
        <img src="https://images.pexels.com/photos/15638351/pexels-photo-15638351.jpeg?auto=compress&cs=tinysrgb&h=650&w=940" alt="摄影师在自然中" loading="eager" width="4000" height="6000">
      </div>
      <div class="about-content">
        <h2>关于我</h2>
        <div class="subhead">风光摄影师 · 行路人</div>
        <p>
          十年间，我背着相机走过了无数条山路。从大兴安岭的白桦林到川西的雪峰，从冰岛的苔原到新西兰的星空——每一次与自然的相遇，都让我更加笃信：最美的风景，永远在步履不停的地平线上。
        </p>
        <p>
          我不追求华丽的后期，只希望用镜头捕捉自然本真的呼吸。每一张照片，都是我与那个瞬间的私人对话。
        </p>
        <div class="signature">—— 林远山</div>
      </div>
    </div>
 </section>

 <!-- 联系区 -->
 <section class="contact-section">
    <div class="container">
      <h2>走进山野</h2>
      <p>分享风光 · 交流拍摄 · 相约同行</p>
      <a href="contact.html" class="contact-cta">与我联系</a>
    </div>
 </section>

 <!-- Footer -->
 <footer class="site-footer">
    <div class="container">
      <span>© 2025 远山集</span>
      <div class="social">
        <a href="https://instagram.com" target="_blank" rel="noopener noreferrer">Instagram</a>
        <a href="https://500px.com" target="_blank" rel="noopener noreferrer">500px</a>
        <a href="about.html">关于</a>
      </div>
    </div>
 </footer>

 <!-- React + Babel -->
 <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
 <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
 <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

 <script type="text/babel">
    const { useState, useEffect } = React;

    // 画廊数据 (每张大图 + caption)
    const galleryImages = [
      { 
        src: "https://images.pexels.com/photos/6899822/pexels-photo-6899822.jpeg?auto=compress&cs=tinysrgb&h=650&w=940", 
        alt: "秋日山林", 
        caption: "秋林 · 喀纳斯", 
        w: 4024, h: 6048 
      },
      { 
        src: "https://images.pexels.com/photos/34096050/pexels-photo-34096050.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940", 
        alt: "雪峰倒影", 
        caption: "雪峰 · 四姑娘山", 
        w: 2049, h: 3074 
      },
      { 
        src: "https://images.pexels.com/photos/34346062/pexels-photo-34346062.jpeg?auto=compress&cs=tinysrgb&h=650&w=940", 
        alt: "晨雾缭绕", 
        caption: "晨雾 · 三清山", 
        w: 4912, h: 7360 
      },
      { 
        src: "https://images.pexels.com/photos/36714900/pexels-photo-36714900.jpeg?auto=compress&cs=tinysrgb&h=650&w=940", 
        alt: "荒原孤树", 
        caption: "孤树 · 坝上草原", 
        w: 2384, h: 3590 
      },
      { 
        src: "https://images.pexels.com/photos/34676607/pexels-photo-34676607.jpeg?auto=compress&cs=tinysrgb&h=650&w=940", 
        alt: "溪流苔石", 
        caption: "溪涧 · 青城山", 
        w: 5184, h: 3888 
      }
    ];

    function GalleryApp() {
      const [lightBoxSrc, setLightBoxSrc] = useState(null);

      const openLightbox = (src) => setLightBoxSrc(src);
      const closeLightbox = () => setLightBoxSrc(null);

      useEffect(() => {
        const handleKey = (e) => { if (e.key === 'Escape') closeLightbox(); };
        window.addEventListener('keydown', handleKey);
        return () => window.removeEventListener('keydown', handleKey);
      }, []);

      return (
        <>
          {galleryImages.map((img, idx) => (
            <div className="gallery-item" key={idx} onClick={() => openLightbox(img.src)}>
              <img 
                src={img.src} 
                alt={img.alt} 
                loading="lazy" 
                width={img.w} 
                height={img.h}
              />
              <div className="gallery-caption">{img.caption}</div>
            </div>
          ))}

          {lightBoxSrc && (
            <div className="lightbox-overlay" onClick={closeLightbox}>
              <img src={lightBoxSrc} alt="灯箱大图" />
            </div>
          )}
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('galleryRoot'));
    root.render(<GalleryApp />);
 </script>
