<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系 · 静谧自然摄影</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #7D6B5D;
            --color-secondary: #9DA896;
            --color-background: #FAF8F5;
            --color-surface: #FFFFFF;
            --color-text: #2B2826;
            --color-textMuted: #7A746C;
            --color-accent: #C9A67C;
            --font-heading: 'Cormorant Garamond', serif;
            --font-body: 'DM Sans', sans-serif;
            --spacing-unit: 1rem;
            --max-width: 1200px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--color-background);
            color: var(--color-text);
            font-family: var(--font-body);
            font-weight: 300;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        img {
            display: block;
            max-width: 100%;
            height: auto;
        }

        a {
            color: inherit;
            text-decoration: none;
            transition: opacity 0.3s;
            opacity: 0.8;
        }

        a:hover {
            opacity: 1;
        }

        /* 导航栏 */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.8rem 2rem;
            background: rgba(250, 248, 245, 0.9);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            font-family: var(--font-body);
            font-weight: 400;
            letter-spacing: 0.06em;
        }

        nav a {
            margin-left: 0.8rem;
            margin-right: 0.8rem;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--color-text);
            padding: 0.4rem 0;
            border-bottom: 1px solid transparent;
            transition: border-color 0.25s, opacity 0.25s;
        }

        nav a:hover {
            border-bottom-color: var(--color-primary);
            opacity: 1;
        }

        nav a.active {
            border-bottom-color: var(--color-primary);
            opacity: 1;
            font-weight: 500;
        }

        /* 页面容器 */
        .page-contact {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 8rem 2rem 4rem;
            max-width: var(--max-width);
            margin: 0 auto;
            width: 100%;
        }

        .contact-intro {
            text-align: center;
            margin-bottom: 3.5rem;
        }

        .contact-intro h1 {
            font-family: var(--font-heading);
            font-size: 3rem;
            font-weight: 300;
            color: var(--color-text);
            letter-spacing: 0.04em;
            margin-bottom: 0.75rem;
        }

        .contact-intro p {
            max-width: 520px;
            margin: 0 auto;
            color: var(--color-textMuted);
            font-size: 1rem;
            line-height: 1.6;
            font-weight: 300;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: start;
        }

        /* 联系表格 */
        .contact-form-wrapper {
            background: var(--color-surface);
            padding: 2.5rem 2.8rem;
            border-radius: 2px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.03);
        }

        .contact-form-wrapper h2 {
            font-family: var(--font-heading);
            font-size: 1.6rem;
            font-weight: 400;
            margin-bottom: 1.5rem;
            color: var(--color-text);
            letter-spacing: 0.02em;
        }

        .form-group {
            margin-bottom: 1.4rem;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--color-textMuted);
            margin-bottom: 0.3rem;
            font-weight: 400;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem 0.2rem;
            border: none;
            border-bottom: 1px solid #ddd;
            background: transparent;
            font-family: var(--font-body);
            font-size: 1rem;
            font-weight: 300;
            color: var(--color-text);
            outline: none;
            transition: border-color 0.3s;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-bottom-color: var(--color-primary);
        }

        .form-group textarea {
            min-height: 100px;
        }

        .submit-btn {
            display: inline-block;
            padding: 0.8rem 2.5rem;
            border: 1px solid var(--color-primary);
            background: transparent;
            color: var(--color-primary);
            font-family: var(--font-body);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            cursor: pointer;
            transition: background 0.3s, color 0.3s;
            margin-top: 0.5rem;
        }

        .submit-btn:hover {
            background: var(--color-primary);
            color: #fff;
        }

        /* 右侧信息区 */
        .contact-side {
            display: flex;
            flex-direction: column;
            gap: 2.2rem;
        }

        .contact-info-block {
            background: var(--color-surface);
            padding: 2rem 2.2rem;
            border-radius: 2px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.03);
        }

        .contact-info-block h3 {
            font-family: var(--font-heading);
            font-size: 1.3rem;
            font-weight: 400;
            margin-bottom: 0.6rem;
            color: var(--color-text);
        }

        .contact-info-block p,
        .contact-info-block a {
            display: block;
            color: var(--color-textMuted);
            font-size: 0.9rem;
            line-height: 1.8;
        }

        .contact-info-block a {
            display: inline-block;
            margin-right: 0.8rem;
            opacity: 0.8;
        }

        .contact-info-block a:hover {
            opacity: 1;
        }

        .social-links {
            margin-top: 0.5rem;
        }

        .social-links a {
            display: inline-block;
            margin-right: 1.2rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--color-primary);
            border-bottom: 1px solid transparent;
            transition: border-color 0.25s;
        }

        .social-links a:hover {
            border-bottom-color: var(--color-primary);
        }

        .contact-image-wrap {
            border-radius: 2px;
            overflow: hidden;
            margin-top: 0.5rem;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
            position: relative;
            aspect-ratio: 2268 / 4032;
            max-height: 280px;
            width: 100%;
        }

        .contact-image-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 2.5rem 2rem;
            color: var(--color-textMuted);
            font-size: 0.75rem;
            letter-spacing: 0.08em;
            border-top: 1px solid rgba(0, 0, 0, 0.04);
            margin-top: 2rem;
        }

        footer a {
            margin: 0 0.5rem;
            text-transform: uppercase;
            font-size: 0.7rem;
        }

        @media (max-width: 768px) {
            nav {
                padding: 1.2rem 1rem;
                gap: 0.2rem;
                flex-wrap: wrap;
            }

            nav a {
                font-size: 0.65rem;
                margin-left: 0.4rem;
                margin-right: 0.4rem;
            }

            .page-contact {
                padding: 7rem 1.2rem 2rem;
            }

            .contact-intro h1 {
                font-size: 2.2rem;
            }

            .contact-grid {
                grid-template-columns: 1fr;
                gap: 2rem;
            }

            .contact-form-wrapper {
                padding: 2rem 1.5rem;
            }

            .contact-info-block {
                padding: 1.5rem 1.5rem;
            }

            .contact-image-wrap {
                max-height: 200px;
            }
        }

        @media (max-width: 480px) {
            .contact-intro h1 {
                font-size: 1.8rem;
            }

            .submit-btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">作品</a>
        <a href="about.html">关于</a>
        <a href="gallery.html">画廊</a>
        <a href="contact.html" class="active">联系</a>
    </nav>

    <main class="page-contact">
        <div class="contact-intro">
            <h1>联系 · 合作</h1>
            <p>如果你也热爱旷野与光影，欢迎来讯。无论是拍摄合作、作品交流，或只是想聊天，我都很高兴收到你的消息。</p>
        </div>

        <div class="contact-grid">
            <!-- 左：联系表单 -->
            <div class="contact-form-wrapper">
                <h2>发送信息</h2>
                <form action="#" method="post" id="contactForm">
                    <div class="form-group">
                        <label for="name">姓名</label>
                        <input type="text" id="name" name="name" placeholder="你的名字" required>
                    </div>
                    <div class="form-group">
                        <label for="email">邮箱</label>
                        <input type="email" id="email" name="email" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="subject">主题</label>
                        <input type="text" id="subject" name="subject" placeholder="拍摄咨询 / 合作 / 其他">
                    </div>
                    <div class="form-group">
                        <label for="message">信息</label>
                        <textarea id="message" name="message" placeholder="写下你想说的话 …" required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">发送</button>
                </form>
            </div>

            <!-- 右：信息 + 配图 -->
            <div class="contact-side">
                <div class="contact-info-block">
                    <h3>联系信息</h3>
                    <p>电子邮箱<br>hello@landscape.photo</p>
                    <p style="margin-top: 0.8rem;">社交媒体</p>
                    <div class="social-links">
                        <a href="https://instagram.com" target="_blank" rel="noopener noreferrer">Instagram</a>
                        <a href="https://500px.com" target="_blank" rel="noopener noreferrer">500px</a>
                        <a href="https://weibo.com" target="_blank" rel="noopener noreferrer">微博</a>
                    </div>
                </div>

                <div class="contact-info-block">
                    <h3>拍摄合作</h3>
                    <p>接受风光旅拍、个人影像项目、品牌视觉合作。欢迎随信附上你的想法与参考，我会在 3 个工作日内回复。</p>
                </div>

                <div class="contact-image-wrap">
                    <img src="https://images.pexels.com/photos/16008692/pexels-photo-16008692.jpeg?auto=compress&cs=tinysrgb&h=650&w=940" alt="静谧自然风光" loading="lazy">
                </div>
            </div>
        </div>
    </main>

    <footer>
        <a href="index.html">作品</a>
        <a href="about.html">关于</a>
        <a href="gallery.html">画廊</a>
        <a href="contact.html">联系</a>
        <span style="opacity: 0.6; margin: 0 1rem;">|</span>
        <span>&copy; 2025 静谧自然 · 风光摄影</span>
    </footer>

</body>
</html>
