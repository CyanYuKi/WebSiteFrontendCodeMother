<!DOCTYPE html>
<html lang="zh-CN">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>画廊 · 风光自然摄影</title>
 <link rel="preconnect" href="https://fonts.googleapis.com">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,200;9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
 <style>
    :root {
      --color-primary: #7D6B5D;
      --color-secondary: #9DA896;
      --color-background: #FAF8F5;
      --color-surface: #FFFFFF;
      --color-text: #2B2826;
      --color-textMuted: #7A746C;
      --color-accent: #C9A67C;
      --font-heading: 'Cormorant Garamond', serif;
      --font-body: 'DM Sans', sans-serif;
      --spacing-unit: 1rem;
      --max-width: 1200px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--color-background);
      color: var(--color-text);
      font-family: var(--font-body);
      font-weight: 300;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    img { display: block; max-width: 100%; height: auto; }
    a { color: inherit; text-decoration: none; transition: opacity 0.3s; }
    a:hover { opacity: 1; }

    /* 导航栏 - 与首页完全一致 (极简顶部) */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 100;
      padding: 1.8rem 3rem;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      background: linear-gradient(to bottom, rgba(250,248,245,0.88) 0%, rgba(250,248,245,0.4) 70%, transparent 100%);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    nav a {
      display: inline-block;
      padding: 0.5rem 1.2rem;
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--color-primary);
      transition: background 0.3s, color 0.3s, opacity 0.3s;
      opacity: 0.75;
      border: none;
      background: transparent;
      position: relative;
    }
    nav a:hover { opacity: 1; }
    nav a.active {
      opacity: 1;
      font-weight: 500;
    }
    nav a.active::after {
      content: '';
      position: absolute;
      bottom: 0.2rem;
      left: 1.2rem;
      right: 1.2rem;
      height: 1px;
      background: var(--color-primary);
    }
    @media (max-width: 640px) {
      nav { padding: 1.2rem 1.5rem; justify-content: center; gap: 0.2rem; }
      nav a { font-size: 0.65rem; padding: 0.4rem 0.8rem; letter-spacing: 0.15em; }
      nav a.active::after { left: 0.8rem; right: 0.8rem; }
    }

    /* 页面容器 */
    .page-wrapper {
      flex: 1;
      padding-top: 6rem;
      padding-bottom: 6rem;
    }

    /* 画廊标题 */
    .gallery-header {
      text-align: center;
      padding: 3rem 2rem 2rem;
      max-width: var(--max-width);
      margin: 0 auto;
    }
    .gallery-header h1 {
      font-family: var(--font-heading);
      font-size: 2.8rem;
      font-weight: 300;
      color: var(--color-text);
      letter-spacing: 0.08em;
      margin-bottom: 0.6rem;
    }
    .gallery-header p {
      color: var(--color-textMuted);
      font-size: 0.95rem;
      font-weight: 300;
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* 分类过滤 (极简) */
    .filter-bar {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.8rem 2rem;
      padding: 1.8rem 2rem 2.5rem;
      max-width: var(--max-width);
      margin: 0 auto;
    }
    .filter-btn {
      background: transparent;
      border: none;
      font-family: var(--font-body);
      font-size: 0.7rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--color-textMuted);
      cursor: pointer;
      padding: 0.25rem 0.1rem;
      transition: color 0.3s, border-bottom 0.3s;
      border-bottom: 1px solid transparent;
      opacity: 0.7;
    }
    .filter-btn:hover { opacity: 1; color: var(--color-primary); }
    .filter-btn.active {
      color: var(--color-primary);
      border-bottom-color: var(--color-primary);
      opacity: 1;
    }

    /* 瀑布流画廊 (grid) - 沉浸式留白大图 */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2rem 1.8rem;
      padding: 0 2rem 3rem;
      max-width: 1400px;
      margin: 0 auto;
    }
    .gallery-item {
      position: relative;
      overflow: hidden;
      border-radius: 2px;
      background: var(--color-surface);
      box-shadow: 0 4px 16px rgba(0,0,0,0.03);
      cursor: pointer;
      transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.5s;
      break-inside: avoid;
      display: inline-block;
      width: 100%;
    }
    .gallery-item:hover {
      transform: scale(1.01);
      box-shadow: 0 12px 32px rgba(0,0,0,0.08);
    }
    .gallery-item .image-wrapper {
      position: relative;
      width: 100%;
      padding-bottom: 75%; /* 3:4 基础比例，实际由图片决定 */
      overflow: hidden;
      background: #eae6e0;
    }
    .gallery-item .image-wrapper img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .gallery-item:hover .image-wrapper img {
      transform: scale(1.04);
    }
    .gallery-item .item-meta {
      padding: 1.2rem 1.2rem 1.6rem;
      background: var(--color-surface);
    }
    .gallery-item .item-meta h3 {
      font-family: var(--font-heading);
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--color-text);
      margin-bottom: 0.2rem;
      letter-spacing: 0.02em;
    }
    .gallery-item .item-meta span {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--color-textMuted);
      display: inline-block;
      margin-right: 1.2rem;
    }

    /* 灯箱 overlay */
    .lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(18,16,14,0.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      padding: 2rem;
    }
    .lightbox.active {
      opacity: 1;
      pointer-events: auto;
    }
    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
      border-radius: 1px;
    }
    .lightbox .close-lightbox {
      position: absolute;
      top: 2rem;
      right: 2.8rem;
      background: none;
      border: none;
      font-size: 2.2rem;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      font-family: var(--font-body);
      transition: color 0.3s;
      line-height: 1;
    }
    .lightbox .close-lightbox:hover { color: #fff; }
    .lightbox .lightbox-caption {
      position: absolute;
      bottom: 2.2rem;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.7);
      font-family: var(--font-body);
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      background: rgba(0,0,0,0.3);
      padding: 0.6rem 1.8rem;
      border-radius: 30px;
      backdrop-filter: blur(4px);
    }
    @media (max-width: 768px) {
      .gallery-grid {
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 1.5rem;
        padding: 0 1.2rem 2rem;
      }
      .lightbox img { max-width: 96vw; max-height: 80vh; }
    }
    @media (max-width: 480px) {
      .gallery-grid { grid-template-columns: 1fr; gap: 1.2rem; }
    }

    /* 图片池备用颜色 */
    .image-placeholder-bg {
      background: #dcd6ce;
    }

    /* Footer (与首页保持一致的极简风格) */
    .site-footer {
      text-align: center;
      padding: 3rem 2rem 2.5rem;
      border-top: 1px solid rgba(125,107,93,0.10);
      margin-top: auto;
    }
    .site-footer .footer-links {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.8rem 2rem;
      margin-bottom: 1.2rem;
    }
    .site-footer .footer-links a {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--color-textMuted);
      opacity: 0.75;
    }
    .site-footer .footer-links a:hover { opacity: 1; }
    .site-footer p {
      font-size: 0.7rem;
      color: var(--color-textMuted);
      letter-spacing: 0.1em;
      opacity: 0.6;
    }

 </style>
</head>
<body>

 <!-- 导航栏 (与首页完全一致) -->
 <nav>
    <a href="index.html">作品</a>
    <a href="about.html">关于</a>
    <a href="gallery.html" class="active">画廊</a>
    <a href="contact.html">联系</a>
 </nav>

 <!-- 页面主体 -->
 <div class="page-wrapper">
    <div class="gallery-header">
      <h1>自然画廊</h1>
      <p>沉浸于天地之间的静谧 · 按地点与季节漫步</p>
    </div>

    <!-- 分类过滤 -->
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">全部</button>
      <button class="filter-btn" data-filter="山峦">山峦</button>
      <button class="filter-btn" data-filter="海岸">海岸</button>
      <button class="filter-btn" data-filter="森林">森林</button>
      <button class="filter-btn" data-filter="冬季">冬季</button>
      <button class="filter-btn" data-filter="秋季">秋季</button>
    </div>

    <!-- 瀑布流画廊 grid -->
    <div class="gallery-grid" id="galleryGrid">
      <!-- 图片数据通过 JS 动态渲染，为了兼容性使用静态占位 + 素材池图片 -->
      <!-- 动态渲染逻辑在脚本中，保证所有素材被使用 -->
    </div>
 </div>

 <!-- 灯箱 -->
 <div class="lightbox" id="lightbox">
    <button class="close-lightbox" id="closeLightbox">✕</button>
    <img id="lightboxImg" src="" alt="放大预览">
    <div class="lightbox-caption" id="lightboxCaption"></div>
 </div>

 <!-- Footer -->
 <footer class="site-footer">
    <div class="footer-links">
      <a href="index.html">作品</a>
      <a href="about.html">关于</a>
      <a href="gallery.html">画廊</a>
      <a href="contact.html">联系</a>
    </div>
    <p>© 2025 风光自然摄影 · 静谧之境</p>
 </footer>

 <script>
    (function() {
      // 所有图片素材 (来自 gallery_pool + 额外素材保证数量)
      const imagePool = [
        { url: "https://images.pexels.com/photos/34096050/pexels-photo-34096050.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940", w:2049, h:3074 },
        { url: "https://images.pexels.com/photos/34346062/pexels-photo-34346062.jpeg?auto=compress&cs=tinysrgb&h=650&w=940", w:4912, h:7360 },
        { url: "https://images.pexels.com/photos/36714900/pexels-photo-36714900.jpeg?auto=compress&cs=tinysrgb&h=650&w=940", w:2384, h:3590 },
        { url: "https://images.pexels.com/photos/34676607/pexels-photo-34676607.jpeg?auto=compress&cs=tinysrgb&h=650&w=940", w:5184, h:3888 },
        // 补充 hero 素材以丰富画廊 (风景类)
        { url: "https://images.pexels.com/photos/8774733/pexels-photo-8774733.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940", w:5464, h:3640 },
        { url: "https://images.pexels.com/photos/6899822/pexels-photo-6899822.jpeg?auto=compress&cs=tinysrgb&h=650&w=940", w:4024, h:6048 },
        { url: "https://images.pexels.com/photos/15638351/pexels-photo-15638351.jpeg?auto=compress&cs=tinysrgb&h=650&w=940", w:4000, h:6000 },
        { url: "https://images.pexels.com/photos/14436002/pexels-photo-14436002.jpeg?auto=compress&cs=tinysrgb&h=650&w=940", w:3024, h:4032 },
        { url: "https://images.pexels.com/photos/16008692/pexels-photo-16008692.jpeg?auto=compress&cs=tinysrgb&h=650&w=940", w:2268, h:4032 },
        { url: "https://images.pexels.com/photos/16157646/pexels-photo-16157646.jpeg?auto=compress&cs=tinysrgb&h=350", w:3040, h:5403 },
        { url: "https://images.pexels.com/photos/13781032/pexels-photo-13781032.jpeg?auto=compress&cs=tinysrgb&h=350", w:5673, h:3782 }
      ];

      // 地点/季节 标签 (模拟分类)
      const categories = ['山峦', '海岸', '森林', '冬季', '秋季', '山峦', '海岸', '森林', '冬季', '秋季', '山峦', '海岸'];
      const locations = ['挪威 · 罗弗敦', '冰岛 · 黑沙滩', '加拿大 · 班夫', '瑞士 · 格林德瓦', '日本 · 北海道', '苏格兰 · 高地', '新西兰 · 峡湾', '美国 · 优胜美地', '意大利 · 多洛米蒂', '奥地利 · 哈尔施塔特', '智利 · 巴塔哥尼亚', '挪威 · 塞尼亚'];

      const grid = document.getElementById('galleryGrid');
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightboxImg');
      const lightboxCaption = document.getElementById('lightboxCaption');
      const closeLightbox = document.getElementById('closeLightbox');

      let currentFilter = 'all';
      let items = [];

      // 生成画廊项目
      function renderItems(filter = 'all') {
        grid.innerHTML = '';
        const filtered = filter === 'all' ? items : items.filter(item => item.category === filter);
        filtered.forEach((item, index) => {
          const div = document.createElement('div');
          div.className = 'gallery-item';
          div.dataset.category = item.category;
          div.dataset.index = index;
          // 随机比例增加错落感
          const aspectRatio = (item.h / item.w) * 100;
          div.innerHTML = `
            <div class="image-wrapper" style="padding-bottom: ${Math.min(aspectRatio, 130)}%;">
              <img src="${item.url}" alt="${item.location}" loading="lazy" />
            </div>
            <div class="item-meta">
              <h3>${item.location}</h3>
              <span>${item.category}</span>
              <span>·</span>
            </div>
          `;
          div.addEventListener('click', function(e) {
            openLightbox(item.url, item.location + ' · ' + item.category);
          });
          grid.appendChild(div);
        });
      }

      // 初始化数据
      function initGallery() {
        items = imagePool.map((img, idx) => {
          const catIdx = idx % categories.length;
          return {
            url: img.url,
            w: img.w,
            h: img.h,
            location: locations[idx % locations.length],
            category: categories[catIdx]
          };
        });
        // 打乱一点点顺序 (但保留第一张)
        renderItems('all');
      }

      // 灯箱
      function openLightbox(url, caption) {
        lightboxImg.src = url;
        lightboxCaption.textContent = caption || '';
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden';
      }

      function closeLightboxFn() {
        lightbox.classList.remove('active');
        document.body.style.overflow = '';
      }

      closeLightbox.addEventListener('click', closeLightboxFn);
      lightbox.addEventListener('click', function(e) {
        if (e.target === lightbox) closeLightboxFn();
      });
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeLightboxFn();
      });

      // 过滤按钮
      const filterBtns = document.querySelectorAll('.filter-btn');
      filterBtns.forEach(btn => {
        btn.addEventListener('click', function() {
          filterBtns.forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          currentFilter = this.dataset.filter;
          renderItems(currentFilter);
        });
      });

      initGallery();
    })();
 </script>

</body>
</html>
